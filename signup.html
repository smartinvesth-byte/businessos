<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Account - Business Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark">

    <div class="container" style="margin-top: 40px;">
        <div class="text-center" style="margin-bottom: 30px;">
            <h1 style="font-size: 1.8rem;">Get Started</h1>
            <p>Build your modular business OS</p>
        </div>

        <div class="card">
            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@business.com" required>
                </div>

                <!-- Signup Form ke andar ye fields add karein -->
<div class="form-group">
    <label>WhatsApp Number</label>
    <input type="tel" id="phone" placeholder="+91 9876543210" required>
</div>

<div class="form-group">
    <label>Business Category</label>
    <select id="category" class="input-style" style="width: 100%; background: var(--bg-secondary); color: white; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
        <option value="retail">Retail Shop</option>
        <option value="service">Service Provider</option>
        <option value="manufacturing">Manufacturing</option>
        <option value="other">Other</option>
    </select>
</div>

                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters" required>
                </div>

                <button type="submit" id="signup-btn" class="btn btn-primary">
                    <span id="btn-text">Create Admin Account</span>
                    <div id="btn-loader" class="spinner" style="width: 20px; height: 20px; display: none;"></div>
                </button>
            </form>
        </div>

        <div class="text-center mt-20">
            <p>Already have an account? <a href="login.html" style="color: var(--accent-color); font-weight: 600; text-decoration: none;">Login</a></p>
        </div>
    </div>

    <script type="module">
        import { auth } from './core/auth.js';

        const signupForm = document.getElementById('signup-form');
        const signupBtn = document.getElementById('signup-btn');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signupBtn.disabled = true;

            try {
                await auth.signUp(email, password, name);
                alert('Signup successful! Please check your email for verification (if enabled) or Login now.');
                window.location.href = 'login.html';
            } catch (error) {
                alert('Signup Error: ' + error.message);
                signupBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Business Brain OS</title>
    
    <!-- Core CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-dark">

    <div class="container" style="margin-top: 60px;">
        <!-- Header Section -->
        <div class="text-center" style="margin-bottom: 40px;">
            <h1 style="font-size: 2rem; margin-bottom: 8px;">Welcome Back</h1>
            <p>Login to manage your business</p>
        </div>

        <!-- Login Card -->
        <div class="card">
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@business.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="forgot-password.html" style="color: var(--accent-color); text-decoration: none; font-size: 0.85rem;">Forgot Password?</a>
                </div>

                <button type="submit" id="login-btn" class="btn btn-primary">
                    <span id="btn-text">Login to OS</span>
                    <div id="btn-loader" class="spinner" style="width: 20px; height: 20px; display: none;"></div>
                </button>
            </form>
        </div>

        <!-- Signup Redirect -->
        <div class="text-center mt-20">
            <p>Don't have an account? <a href="signup.html" style="color: var(--accent-color); font-weight: 600; text-decoration: none;">Create Account</a></p>
        </div>
    </div>

    <!-- Scripting -->
    <script type="module">
        import { auth } from './core/auth.js';

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // UI Feedback: Loading Start
            loginBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';

            try {
                const data = await auth.login(email, password);
                if (data) {
                    // Success: Auth Engine automatically handles session check
                    // par hum force redirect bhi kar sakte hain
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                alert('Login Failed: ' + error.message);
                // UI Feedback: Loading Stop
                loginBtn.disabled = false;
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        });
    </script>
</body>
</html>

 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-dark">

    <!-- Universal Top Navbar -->
    <header class="top-navbar" style="position: fixed; top: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; border-bottom: 1px solid var(--border-color);">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div onclick="location.href='profile.html'" style="width: 32px; height: 32px; background: var(--accent-color); border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                <img id="header-avatar" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                <i data-lucide="user" id="header-icon" size="18" style="color: white;"></i>
            </div>
            <span id="biz-name-top" style="font-weight: 700; font-size: 1.1rem;">Brain OS</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="theme-btn" style="cursor: pointer; padding: 5px;"><i data-lucide="sun" size="20"></i></div>
            <i data-lucide="search" size="22" onclick="location.href='workspace.html'"></i>
            <i data-lucide="bell" size="22" onclick="location.href='alerts.html'"></i>
        </div>
    </header>

    <main class="container" style="margin-top: 80px; padding-bottom: 100px;">
        <div class="card">
            <p style="color: var(--accent-color); font-weight: 600; font-size: 0.8rem;">BUSINESS HEALTH</p>
            <h2 style="font-size: 2rem;">0<span style="font-size: 1rem; color: var(--text-muted);">/100</span></h2>
        </div>

        <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
            <div class="card">
                <span style="font-size: 0.75rem; color: var(--text-muted);">Revenue</span>
                <div style="font-size: 1.2rem; font-weight: 700; margin-top: 5px;">₹0</div>
            </div>
            <div class="card">
                <span style="font-size: 0.75rem; color: var(--text-muted);">Expenses</span>
                <div style="font-size: 1.2rem; font-weight: 700; margin-top: 5px;">₹0</div>
            </div>
        </div>
    </main>

    <!-- Universal Bottom Nav -->
    <nav class="bottom-nav" style="position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000;">
        <a href="dashboard.html" class="nav-item active"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        lucide.createIcons();

        // 1. Theme Engine
        const applyTheme = (theme) => {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const btn = document.getElementById('theme-btn');
            btn.innerHTML = theme === 'light' ? '<i data-lucide="moon" size="20"></i>' : '<i data-lucide="sun" size="20"></i>';
            lucide.createIcons();
        };
        document.getElementById('theme-btn').onclick = () => {
            const current = localStorage.getItem('theme') || 'dark';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        };
        if(localStorage.getItem('theme') === 'light') applyTheme('light');

        // 2. Load Top Nav Info
        async function loadNav() {
            const { data: { user } } = await supabase.auth.getUser();
            if(!user) return;
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if(profile) {
                document.getElementById('biz-name-top').innerText = profile.business_name || "Brain OS";
                if(profile.avatar_url) {
                    document.getElementById('header-avatar').src = profile.avatar_url;
                    document.getElementById('header-avatar').style.display = 'block';
                    document.getElementById('header-icon').style.display = 'none';
                }
            }
        }
        loadNav();
    </script>
</body>
</html>

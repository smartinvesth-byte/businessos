 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-dark">

    <!-- TOP NAVBAR (SAME EVERYWHERE) -->
    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;" onclick="location.href='profile.html'">
            <img id="nav-avatar" src="https://via.placeholder.com/32" class="profile-img-nav">
            <span id="biz-name-nav" style="font-weight: 700; font-size: 1rem;">Brain OS</span>
        </div>
        <div style="display: flex; gap: 18px; align-items: center;">
            <i data-lucide="sun" id="theme-btn" size="20" style="cursor: pointer;"></i>
            <i data-lucide="search" size="20" onclick="location.href='workspace.html'"></i>
            <i data-lucide="bell" size="20" onclick="location.href='alerts.html'"></i>
        </div>
    </header>

    <main class="container">
        <!-- Dashboard Content -->
        <div class="card">
            <p style="color: var(--accent-color); font-weight: 600; font-size: 0.8rem;">BUSINESS HEALTH</p>
            <h2 style="font-size: 2rem;">0<span style="font-size: 1rem; color: var(--text-muted);">/100</span></h2>
        </div>
        <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
            <div class="card"><span style="color:var(--text-muted); font-size:0.8rem;">Revenue</span><h3>₹0</h3></div>
            <div class="card"><span style="color:var(--text-muted); font-size:0.8rem;">Expenses</span><h3>₹0</h3></div>
        </div>
    </main>

    <!-- BOTTOM NAV (SAME EVERYWHERE) -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        lucide.createIcons();

        // Universal Theme & Profile Loader
        async function initShell() {
            if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
            
            const { data: { user } } = await supabase.auth.getUser();
            if(user) {
                const { data: prof } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                if(prof && prof.avatar_url) document.getElementById('nav-avatar').src = prof.avatar_url;
                if(prof && prof.business_name) document.getElementById('biz-name-nav').innerText = prof.business_name;
            }
        }
        document.getElementById('theme-btn').onclick = () => {
            const t = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
            location.reload();
        };
        initShell();
    </script>
</body>
</html>

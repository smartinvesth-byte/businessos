 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Shared Styles for Bottom Nav and Theme */
        .top-navbar { position: fixed; top: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 100; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent-color); }
        .theme-toggle { cursor: pointer; padding: 8px; border-radius: 50%; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="bg-dark">

    <!-- Top Navbar -->
    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div id="biz-logo-small" style="width: 32px; height: 32px; background: var(--accent-color); border-radius: 8px; overflow: hidden;">
                <img id="header-avatar" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            </div>
            <span id="biz-name-top" style="font-weight: 700; font-size: 1.1rem;">Brain OS</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="theme-toggle" id="theme-btn"><i data-lucide="sun" size="18"></i></div>
            <i data-lucide="search" size="20" onclick="location.href='workspace.html'"></i>
            <i data-lucide="bell" size="20" onclick="alert('Notifications Coming Soon')"></i>
            <i data-lucide="user-circle" size="20" onclick="location.href='profile.html'"></i>
        </div>
    </header>

    <main class="container" style="margin-top: 80px;">
        <!-- Stats Card (Zero by Default) -->
        <div class="card health-score-card">
            <p style="color: var(--accent-color); font-weight: 600; font-size: 0.8rem;">BUSINESS HEALTH</p>
            <h2 style="font-size: 2rem;"><span id="health-score">0</span><span style="font-size: 1rem; color: var(--text-muted);">/100</span></h2>
        </div>

        <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
            <div class="stat-card card">
                <span class="stat-label">Revenue</span>
                <div class="stat-value">₹<span id="rev-val">0</span></div>
            </div>
            <div class="stat-card card">
                <span class="stat-label">Expenses</span>
                <div class="stat-value">₹<span id="exp-val">0</span></div>
            </div>
        </div>
    </main>

    <!-- Consistent Bottom Nav -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        import { auth } from './core/auth.js';
        lucide.createIcons();

        // 1. Theme Toggle Logic
        const themeBtn = document.getElementById('theme-btn');
        themeBtn.onclick = () => {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            themeBtn.innerHTML = target === 'light' ? '<i data-lucide="moon" size="18"></i>' : '<i data-lucide="sun" size="18"></i>';
            lucide.createIcons();
        };

        // 2. Load User Data
        async function loadDashboard() {
            const { data: { user } } = await supabase.auth.getUser();
            if(!user) return;

            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if(profile) {
                document.getElementById('biz-name-top').innerText = profile.business_name || "Brain OS";
                if(profile.avatar_url) {
                    const img = document.getElementById('header-avatar');
                    img.src = profile.avatar_url;
                    img.style.display = 'block';
                }
            }
        }
        loadDashboard();
    </script>
</body>
</html>

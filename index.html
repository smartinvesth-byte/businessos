<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Brain OS</title>
    
    <!-- 1. Core Libraries & Fonts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        /* Modern Loader Styling */
        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a; /* Dark background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .spinner-box {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(59, 130, 246, 0.1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .brand-text {
            margin-top: 24px;
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-txt {
            margin-top: 10px;
            color: #64748b;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Backup link styling if redirect fails */
        #app {
            display: none;
            color: white;
            text-align: center;
            padding: 50px 20px;
            font-family: 'Inter', sans-serif;
        }
        .manual-link {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-dark">

    <!-- 2. Loader Screen (Visible for 5 Seconds) -->
    <div id="app-loader" class="loader-wrapper">
        <div class="spinner-box"></div>
        <h1 class="brand-text">Business Brain OS</h1>
        <p class="status-txt" id="load-msg">Booting core systems...</p>
    </div>

    <!-- 3. App Content Area (Backup UI) -->
    <div id="app">
        <h2>Redirecting...</h2>
        <p>If you are not redirected automatically, <a href="login.html" class="manual-link">Click here to Sign In</a></p>
    </div>

    <!-- 4. Core Logic -->
    <script type="module">
        import { initAuth } from './core/auth.js';

        window.addEventListener('load', () => {
            const statusMsg = document.getElementById('load-msg');
            
            console.log("Loader started. Waiting 5 seconds...");

            // Logic to wait for 5 seconds as per requirement
            setTimeout(async () => {
                statusMsg.innerText = "Connecting to Cloud...";
                
                try {
                    // checkSession and redirection logic inside initAuth
                    // initAuth calls auth.checkSession() which decides Login or Dashboard
                    await initAuth(); 
                    
                    // Safety: In case redirect doesn't happen, hide loader
                    document.getElementById('app-loader').style.display = 'none';
                    document.getElementById('app').style.display = 'block';

                } catch (error) {
                    console.error("Initialization Failed:", error);
                    // Fallback to Login on error
                    window.location.href = 'login.html';
                }
            }, 5000); // 5000ms = 5 Seconds
        });
    </script>
</body>
</html>

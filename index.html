<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Brain OS</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Core CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Supabase CDN (Standard Script) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-dark">

    <!-- Splash Screen / Loader -->
    <div id="app-loader" class="loader-container">
        <div class="spinner"></div>
        <h1 class="brand-name">Business Brain OS</h1>
    </div>

    <!-- Main App Mount Point -->
    <div id="app" style="display: none;">
        <!-- Content will be injected or redirected via router.js -->
    </div>

    <!-- Core Scripts -->
    <script type="module" src="database/supabase.js"></script>
    <script type="module" src="core/auth.js"></script>
    <script type="module" src="core/router.js"></script>
    
    <script type="module">
        import { initAuth } from './core/auth.js';
        
        window.addEventListener('DOMContentLoaded', async () => {
            // Check session on load
            await initAuth();
        });
    </script>
</body>
</html>

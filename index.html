<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Brain OS</title>
    <!-- 1. Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark">

    <div id="app-loader" style="position:fixed; width:100%; height:100%; background:#0f172a; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; color:white; font-family:sans-serif;">
        <div class="spinner"></div>
        <h1 style="color:#3b82f6; margin-top:20px;">Business Brain OS</h1>
        <p id="status-msg">Initializing Systems...</p>
        <!-- Yahan error dikhega agar app crash hui -->
        <div id="error-log" style="color:#ef4444; font-size:12px; margin-top:20px; padding:20px; text-align:center;"></div>
    </div>

    <div id="app" style="display: none;"></div>

    <script type="module">
        // Screen par error dikhane wala function
        window.onerror = function(msg, url, line) {
            document.getElementById('error-log').innerHTML = "ERROR: " + msg + "<br>Line: " + line;
            return false;
        };

        import { initAuth } from './core/auth.js';

        window.addEventListener('load', async () => {
            const status = document.getElementById('status-msg');
            const loader = document.getElementById('app-loader');
            const app = document.getElementById('app');

            try {
                status.innerText = "Checking Authentication...";
                await initAuth();
                
                // Agar initAuth() successful raha toh loader hatao
                loader.style.display = 'none';
                app.style.display = 'block';
            } catch (err) {
                console.error(err);
                document.getElementById('error-log').innerText = "Critical Crash: " + err.message;
                // Force show app even on error for debugging
                setTimeout(() => {
                    loader.style.display = 'none';
                    app.style.display = 'block';
                }, 3000);
            }
        });
    </script>
</body>
</html>

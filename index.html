<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signup - Business Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-dark">

    <div class="container" style="margin-top: 20px;">
        <div class="text-center" style="margin-bottom: 20px;">
            <h1 style="font-size: 1.8rem;">Get Started</h1>
            <p>Build your modular business OS</p>
        </div>

        <div class="card">
            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@business.com" required>
                </div>

                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input type="tel" id="phone" placeholder="+91 9876543210" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender" class="input-style" style="width: 100%; background: var(--bg-secondary); color: white; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dob" required style="width: 100%; background: var(--bg-secondary); color: white; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;">
                    </div>
                </div>

                <div class="form-group">
                    <label>Business Name</label>
                    <input type="text" id="bizname" placeholder="My Awesome Shop" required>
                </div>

                <div class="form-group">
                    <label>Business Category</label>
                    <select id="category" style="width: 100%; background: var(--bg-secondary); color: white; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                        <option value="Retail">Retail Shop</option>
                        <option value="Pharmacy">Pharmacy / Medical</option>
                        <option value="Restaurant">Restaurant / Cafe</option>
                        <option value="Electronics">Electronics & Mobile</option>
                        <option value="Garments">Garments / Fashion</option>
                        <option value="Service">Service Provider</option>
                        <option value="Manufacturing">Manufacturing</option>
                        <option value="Agency">Agency / Real Estate</option>
                        <option value="Other">Other Business</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" id="password" placeholder="Min 6 chars" required>
                </div>

                <button type="submit" id="signup-btn" class="btn btn-primary">Create Admin Account</button>
            </form>
        </div>

        <div class="text-center mt-20" style="padding-bottom: 40px;">
            <p>Already have an account? <a href="login.html" style="color: var(--accent-color); font-weight: 600; text-decoration: none;">Login</a></p>
        </div>
    </div>

    <script type="module">
        import { auth } from './core/auth.js';

        const signupForm = document.getElementById('signup-form');
        const signupBtn = document.getElementById('signup-btn');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            signupBtn.disabled = true;
            signupBtn.innerText = "Creating Account...";

            const userData = {
                fullName: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                gender: document.getElementById('gender').value,
                dob: document.getElementById('dob').value,
                businessName: document.getElementById('bizname').value,
                category: document.getElementById('category').value
            };

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Yahan master signup function call hoga
                await auth.signUp(email, password, userData);
                alert('Account created successfully! Welcome to Brain OS.');
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('Signup Error: ' + error.message);
                signupBtn.disabled = false;
                signupBtn.innerText = "Create Admin Account";
            }
        });
    </script>
</body>
</html>

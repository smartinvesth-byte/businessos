<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Brain OS</title>
    <!-- 1. Library load hone dein -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark">

    <div id="app-loader" style="position:fixed; width:100%; height:100%; background:#0f172a; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; color:white;">
        <div class="spinner"></div>
        <h1 style="color:#3b82f6; margin-top:20px;">Business Brain OS</h1>
        <p id="debug-log" style="font-size:12px; color:gray; margin-top:10px;">Starting Engine...</p>
    </div>

    <div id="app" style="display: none;"></div>

    <script type="module">
        import { initAuth } from './core/auth.js';

        window.addEventListener('load', async () => {
            try {
                // Wait for library to be available in window
                let checkCount = 0;
                const checkLib = setInterval(async () => {
                    checkCount++;
                    if (window.supabase || checkCount > 50) {
                        clearInterval(checkLib);
                        document.getElementById('debug-log').innerText = "Auth Check...";
                        await initAuth();
                        document.getElementById('app-loader').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                    }
                }, 100);
            } catch (err) {
                document.getElementById('debug-log').style.color = 'red';
                document.getElementById('debug-log').innerText = "Error: " + err.message;
            }
        });
    </script>
</body>
</html>

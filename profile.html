 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Shared Bottom/Top Nav styles same as Dashboard */
        .profile-pic-area { text-align: center; margin-bottom: 25px; position: relative; width: 100px; height: 100px; margin: 0 auto 30px; }
        .profile-pic-area img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--accent-color); object-fit: cover; }
        .upload-btn { position: absolute; bottom: 0; right: 0; background: var(--accent-color); color: white; padding: 5px; border-radius: 50%; border: 2px solid var(--bg-primary); cursor: pointer; }
    </style>
</head>
<body class="bg-dark">

    <!-- Same Top Navbar -->
    <header class="top-navbar" style="position: fixed; top: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; border-bottom: 1px solid var(--border-color);">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="chevron-left" onclick="history.back()"></i>
            <span style="font-weight: 700; font-size: 1.1rem;">Settings & Profile</span>
        </div>
        <div id="theme-btn" style="cursor: pointer; padding: 5px;"><i data-lucide="sun" size="20"></i></div>
    </header>

    <main class="container" style="margin-top: 80px; padding-bottom: 100px;">
        <!-- Avatar Upload -->
        <div class="profile-pic-area">
            <img id="p-avatar" src="https://via.placeholder.com/100">
            <label for="img-input" class="upload-btn"><i data-lucide="camera" size="14"></i></label>
            <input type="file" id="img-input" hidden accept="image/*">
        </div>

        <div class="card">
            <div class="form-group"><label>Full Name</label><input type="text" id="p-name"></div>
            <div class="form-group"><label>Phone (WhatsApp)</label><input type="tel" id="p-phone"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group"><label>Gender</label><select id="p-gender" style="width:100%; padding:12px; background:var(--bg-secondary); color:white; border-radius:8px; border:1px solid var(--border-color);">
                    <option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
                </select></div>
                <div class="form-group"><label>DOB</label><input type="date" id="p-dob" style="width:100%; padding:10px; background:var(--bg-secondary); color:white; border-radius:8px; border:1px solid var(--border-color);"></div>
            </div>
        </div>

        <div class="card" style="margin-top: 15px;">
            <div class="form-group"><label>Business Name</label><input type="text" id="p-biz"></div>
            <div class="form-group"><label>Category</label><select id="p-cat" style="width:100%; padding:12px; background:var(--bg-secondary); color:white; border-radius:8px; border:1px solid var(--border-color);">
                <option value="Retail">Retail</option><option value="Pharmacy">Pharmacy</option><option value="Restaurant">Restaurant</option>
            </select></div>
        </div>

        <button class="btn btn-primary" id="save-profile" style="margin-top: 20px;">Save Profile</button>
        <button class="btn btn-secondary" id="logout-btn" style="margin-top: 20px; color: var(--danger); border-color: rgba(239, 68, 68, 0.2);">Logout Account</button>
    </main>

    <!-- Same Bottom Nav -->
    <nav class="bottom-nav" style="position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000;">
        <a href="dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item active"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        import { auth } from './core/auth.js';
        lucide.createIcons();

        // Theme logic
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');

        // Load and Save Profile
        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            const { data: biz } = await supabase.from('businesses').select('*').eq('owner_id', user.id).single();

            if (profile) {
                document.getElementById('p-name').value = profile.full_name || '';
                document.getElementById('p-phone').value = profile.phone || '';
                document.getElementById('p-gender').value = profile.gender || 'Male';
                document.getElementById('p-dob').value = profile.dob || '';
                if(profile.avatar_url) document.getElementById('p-avatar').src = profile.avatar_url;
            }
            if(biz) document.getElementById('p-biz').value = biz.business_name || '';
        }

        document.getElementById('save-profile').onclick = async () => {
            const { data: { user } } = await supabase.auth.getUser();
            await supabase.from('profiles').upsert({
                id: user.id, full_name: document.getElementById('p-name').value,
                phone: document.getElementById('p-phone').value, gender: document.getElementById('p-gender').value,
                dob: document.getElementById('p-dob').value
            });
            await supabase.from('businesses').update({ business_name: document.getElementById('p-biz').value }).eq('owner_id', user.id);
            alert("Updated!");
        };

        document.getElementById('img-input').onchange = async (e) => {
            const file = e.target.files[0];
            const { data: { user } } = await supabase.auth.getUser();
            const path = `avatars/${user.id}-${Date.now()}`;
            await supabase.storage.from('avatars').upload(path, file);
            const { data } = supabase.storage.from('avatars').getPublicUrl(path);
            await supabase.from('profiles').update({ avatar_url: data.publicUrl }).eq('id', user.id);
            document.getElementById('p-avatar').src = data.publicUrl;
        };

        document.getElementById('logout-btn').onclick = () => auth.logout();
        init();
    </script>
</body>
</html>

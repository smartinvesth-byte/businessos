 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-dark">

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="chevron-left" onclick="location.href='dashboard.html'"></i>
            <span style="font-weight: 700;">Settings & Profile</span>
        </div>
        <i data-lucide="sun" id="theme-btn" size="20"></i>
    </header>

    <main class="container">
        <!-- Profile Pic Upload -->
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="position: relative; width: 110px; height: 110px; margin: 0 auto;">
                <img id="main-avatar" src="https://via.placeholder.com/110" style="width:100%; height:100%; border-radius:50%; border:3px solid var(--accent-color); object-fit:cover;">
                <label for="img-input" style="position:absolute; bottom:0; right:0; background:var(--accent-color); padding:8px; border-radius:50%; cursor:pointer;">
                    <i data-lucide="camera" size="16" style="color:white;"></i>
                </label>
                <input type="file" id="img-input" hidden accept="image/*">
            </div>
        </div>

        <!-- Forms (All Fields from Signup) -->
        <div class="card">
            <div class="form-group"><label>Full Name</label><input type="text" id="edit-name"></div>
            <div class="form-group"><label>WhatsApp Number</label><input type="tel" id="edit-phone"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>Gender</label>
                    <select id="edit-gender" style="width:100%; background:var(--bg-secondary); color:white; padding:12px; border:1px solid var(--border-color); border-radius:8px;">
                        <option value="Male">Male</option><option value="Female">Female</option>
                    </select>
                </div>
                <div class="form-group"><label>DOB</label><input type="date" id="edit-dob" style="width:100%; background:var(--bg-secondary); color:white; border:1px solid var(--border-color); border-radius:8px; padding:10px;"></div>
            </div>
        </div>

        <div class="card" style="margin-top:15px;">
            <div class="form-group"><label>Business Name</label><input type="text" id="edit-biz"></div>
            <div class="form-group">
                <label>Category</label>
                <select id="edit-cat" style="width:100%; background:var(--bg-secondary); color:white; padding:12px; border:1px solid var(--border-color); border-radius:8px;">
                    <option value="Retail">Retail Shop</option><option value="Pharmacy">Pharmacy</option><option value="Restaurant">Restaurant</option>
                </select>
            </div>
        </div>

        <button class="btn btn-primary" id="update-btn" style="margin-top:20px;">Save Profile Changes</button>
        <button class="btn btn-secondary" id="logout-btn" style="margin-top:15px; color:var(--danger);">Logout Account</button>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item active"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        import { auth } from './core/auth.js';
        lucide.createIcons();

        async function loadProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            const { data: prof } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            const { data: biz } = await supabase.from('businesses').select('*').eq('owner_id', user.id).single();

            if(prof) {
                document.getElementById('edit-name').value = prof.full_name || '';
                document.getElementById('edit-phone').value = prof.phone || '';
                document.getElementById('edit-gender').value = prof.gender || 'Male';
                document.getElementById('edit-dob').value = prof.dob || '';
                if(prof.avatar_url) document.getElementById('main-avatar').src = prof.avatar_url;
            }
            if(biz) {
                document.getElementById('edit-biz').value = biz.business_name || '';
                document.getElementById('edit-cat').value = biz.business_category || 'Retail';
            }
        }

        document.getElementById('update-btn').onclick = async () => {
            const { data: { user } } = await supabase.auth.getUser();
            await supabase.from('profiles').upsert({
                id: user.id, full_name: document.getElementById('edit-name').value,
                phone: document.getElementById('edit-phone').value, gender: document.getElementById('edit-gender').value,
                dob: document.getElementById('edit-dob').value
            });
            await supabase.from('businesses').update({ business_name: document.getElementById('edit-biz').value, business_category: document.getElementById('edit-cat').value }).eq('owner_id', user.id);
            alert("Profile Updated!");
            location.reload();
        };

        document.getElementById('img-input').onchange = async (e) => {
            const file = e.target.files[0];
            const { data: { user } } = await supabase.auth.getUser();
            const path = `avatars/${user.id}-${Date.now()}`;
            await supabase.storage.from('avatars').upload(path, file);
            const { data } = supabase.storage.from('avatars').getPublicUrl(path);
            await supabase.from('profiles').update({ avatar_url: data.publicUrl }).eq('id', user.id);
            location.reload();
        };

        document.getElementById('logout-btn').onclick = () => auth.logout();
        loadProfile();
    </script>
</body>
</html>

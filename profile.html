  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .avatar-uploader { text-align: center; padding: 20px; }
        .avatar-preview { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent-color); object-fit: cover; }
        .logout-section { margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 20px; }
    </style>
</head>
<body class="bg-dark">

    <div class="container">
        <h2>Settings & Profile</h2>
        
        <div class="card avatar-uploader">
            <img id="profile-img-preview" src="https://via.placeholder.com/100" class="avatar-preview">
            <br>
            <input type="file" id="avatar-file" hidden accept="image/*">
            <button class="btn btn-secondary mt-20" onclick="document.getElementById('avatar-file').click()">Change Photo</button>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="prof-name">
            </div>
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" id="prof-biz">
            </div>
            <button class="btn btn-primary" id="save-prof">Save Changes</button>
        </div>

        <div class="logout-section">
            <button class="btn btn-secondary" style="color: var(--danger);" id="logout-btn">
                <i data-lucide="log-out"></i> Logout Account
            </button>
        </div>
    </div>

    <!-- Bottom Nav (Same as Dashboard) -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item active"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        import { auth } from './core/auth.js';
        lucide.createIcons();

        const fileInput = document.getElementById('avatar-file');
        const preview = document.getElementById('profile-img-preview');

        // Image Upload Logic
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            const { data: { user } } = await supabase.auth.getUser();
            const path = `avatars/${user.id}-${Date.now()}`;
            
            await supabase.storage.from('avatars').upload(path, file);
            const { data } = supabase.storage.from('avatars').getPublicUrl(path);
            
            await supabase.from('profiles').update({ avatar_url: data.publicUrl }).eq('id', user.id);
            preview.src = data.publicUrl;
            alert("Image Uploaded!");
        };

        document.getElementById('logout-btn').onclick = () => auth.logout();
    </script>
</body>
</html>

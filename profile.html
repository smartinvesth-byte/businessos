<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detailed Profile - Business Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .profile-section-title {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px 0;
            font-weight: 700;
        }
        select.input-field {
            width: 100%;
            background: var(--bg-secondary);
            color: var(--text-main);
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            outline: none;
        }
    </style>
</head>
<body class="bg-dark">

    <!-- Top Profile Header (Same as before) -->
    <div class="profile-header" style="text-align: center; padding: 30px 20px;">
        <div class="avatar-container" style="position: relative; width: 100px; height: 100px; margin: 0 auto 15px;">
            <img src="https://via.placeholder.com/100" id="profile-img" style="width:100%; height:100%; border-radius:50%; object-fit:cover; border:3px solid var(--accent-color);">
            <label for="avatar-input" style="position:absolute; bottom:0; right:0; background:var(--accent-color); padding:5px; border-radius:50%; cursor:pointer;">
                <i data-lucide="camera" size="14" style="color:white;"></i>
            </label>
            <input type="file" id="avatar-input" hidden accept="image/*">
        </div>
        <h2 id="display-name">Owner Name</h2>
        <p id="display-business" style="color: var(--text-muted);">Business Name</p>
    </div>

    <div class="container" style="padding-top: 0;">
        
        <!-- Personal Info Section -->
        <div class="profile-section-title">Personal Information</div>
        <div class="card">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="edit-name">
            </div>
            <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>Gender</label>
                    <select id="edit-gender" class="input-field">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="edit-dob" class="input-field">
                </div>
            </div>
            <div class="form-group">
                <label>WhatsApp / Phone</label>
                <input type="tel" id="edit-phone">
            </div>
        </div>

        <!-- Business Info Section -->
        <div class="profile-section-title">Business Details</div>
        <div class="card">
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" id="edit-business">
            </div>
            <div class="form-group">
                <label>Business Category</label>
                <select id="edit-category" class="input-field">
                    <option value="Retail">Retail</option>
                    <option value="Wholesale">Wholesale</option>
                    <option value="Service">Service</option>
                    <option value="Restaurant">Restaurant</option>
                    <option value="Pharmacy">Pharmacy</option>
                </select>
            </div>
            <div class="form-group">
                <label>Business Address</label>
                <textarea id="edit-address" style="width:100%; background:var(--bg-secondary); border:1px solid var(--border-color); color:white; padding:10px; border-radius:8px;"></textarea>
            </div>
        </div>

        <button class="btn btn-primary" id="save-profile-btn" style="margin-top: 10px;">Save All Changes</button>
        
        <button class="btn btn-secondary mt-20" id="logout-btn" style="color: var(--danger); border-color: rgba(239, 68, 68, 0.2);">
            Logout
        </button>
    </div>

    <script type="module">
        import { supabase } from './database/supabase.js';
        import { UI } from './core/ui.js';
        import { auth } from './core/auth.js';

        lucide.createIcons();

        async function loadProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();

            if (profile) {
                document.getElementById('display-name').innerText = profile.full_name || 'Set Name';
                document.getElementById('display-business').innerText = profile.business_name || 'Set Business';
                
                document.getElementById('edit-name').value = profile.full_name || '';
                document.getElementById('edit-business').value = profile.business_name || '';
                document.getElementById('edit-gender').value = profile.gender || 'Male';
                document.getElementById('edit-dob').value = profile.dob || '';
                document.getElementById('edit-phone').value = profile.phone || '';
                document.getElementById('edit-category').value = profile.business_category || 'Retail';
                document.getElementById('edit-address').value = profile.business_address || '';
                if(profile.avatar_url) document.getElementById('profile-img').src = profile.avatar_url;
            }
        }

        document.getElementById('save-profile-btn').onclick = async () => {
            UI.setLoading('save-profile-btn', true);
            const { data: { user } } = await supabase.auth.getUser();

            const updates = {
                id: user.id,
                full_name: document.getElementById('edit-name').value,
                business_name: document.getElementById('edit-business').value,
                gender: document.getElementById('edit-gender').value,
                dob: document.getElementById('edit-dob').value,
                phone: document.getElementById('edit-phone').value,
                business_category: document.getElementById('edit-category').value,
                business_address: document.getElementById('edit-address').value,
                updated_at: new Date()
            };

            const { error } = await supabase.from('profiles').upsert(updates);
            UI.setLoading('save-profile-btn', false);

            if (error) UI.showToast("Error updating profile", "error");
            else UI.showToast("Profile updated successfully!", "success");
        };

        // Profile Image Upload and Logout logic remains same as previous step...
        document.getElementById('logout-btn').onclick = () => auth.logout();
        loadProfile();
    </script>
</body>
</html>

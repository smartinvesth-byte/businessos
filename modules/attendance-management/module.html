<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Manager - Brain OS</title>
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #1e293b; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.7rem; text-decoration: none; flex: 1; gap: 4px; }
        .nav-item.active { color: #3b82f6; }
        .container { padding: 80px 15px 100px; min-height: 100vh; background: #0f172a; color: white; }

        /* Today's Stats */
        .stats-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #1e293b; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-box small { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; }
        .stat-box div { font-size: 1rem; font-weight: 700; margin-top: 4px; }

        /* Attendance List */
        .staff-att-card { background: #1e293b; border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .att-header { display: flex; justify-content: space-between; align-items: center; }
        .staff-name { font-weight: 700; font-size: 0.95rem; }
        .staff-dept { font-size: 0.7rem; color: #94a3b8; }

        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .att-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; font-size: 0.7rem; font-weight: 700; cursor: pointer; }
        .att-btn.active-p { background: #22c55e; border-color: #22c55e; }
        .att-btn.active-a { background: #ef4444; border-color: #ef4444; }
        .att-btn.active-h { background: #f59e0b; border-color: #f59e0b; }

        .time-row { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .time-box { font-size: 0.7rem; color: #94a3b8; }
        .time-box span { color: white; font-weight: 600; display: block; margin-top: 2px; }
    </style>
</head>
<body>

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div onclick="location.href='../../workspace.html'" style="cursor:pointer"><i data-lucide="chevron-left"></i></div>
            <span style="font-weight: 700;">Daily Attendance</span>
        </div>
        <div style="font-size: 0.8rem; font-weight: 600; color: #3b82f6;" id="today-date">Loading...</div>
    </header>

    <main class="container">
        <!-- Stats Summary -->
        <div class="stats-strip">
            <div class="stat-box"><small>Present</small><div id="count-p" style="color:#22c55e">0</div></div>
            <div class="stat-box"><small>Absent</small><div id="count-a" style="color:#ef4444">0</div></div>
            <div class="stat-box"><small>On Leave</small><div id="count-l" style="color:#f59e0b">0</div></div>
        </div>

        <!-- Staff Attendance List -->
        <div id="attendance-list">
            <p style="text-align:center; color:gray; margin-top:50px;">Fetching Staff Members...</p>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script>
        // CONFIG
        const SB_URL = 'https://leeildsotoqjakirlqsx.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlZWlsZHNvdG9xamFraXJscXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjEyNzEsImV4cCI6MjA5NTEzNzI3MX0.0dxnUHBD-4RyBEQlCGhFjZKd0kA4aRUyOmo3cGhxYjc';

        let sb, bID = null;
        const today = new Date().toISOString().split('T')[0];

        window.onload = async () => {
            document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short' });
            lucide.createIcons();

            try {
                sb = window.supabase.createClient(SB_URL, SB_KEY);
                const { data: { user } } = await sb.auth.getUser();
                if(!user) return window.location.href = '../../login.html';

                const { data: biz } = await sb.from('businesses').select('id').eq('owner_id', user.id).maybeSingle();
                bID = biz.id;
                
                loadAttendance();
            } catch (e) { console.error(e); }
        };

        async function loadAttendance() {
            const container = document.getElementById('attendance-list');
            
            // 1. Get all staff
            const { data: staff } = await sb.from('staff').select('*').eq('business_id', bID).eq('status', 'Active');
            
            // 2. Get today's logs
            const { data: logs } = await sb.from('attendance').select('*').eq('business_id', bID).eq('date', today);

            if(!staff || staff.length === 0) {
                container.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:50px;">No active staff found. Add staff first.</p>`;
                return;
            }

            // Summary Counts
            document.getElementById('count-p').innerText = logs.filter(l => l.status === 'Present').length;
            document.getElementById('count-a').innerText = logs.filter(l => l.status === 'Absent').length;
            document.getElementById('count-l').innerText = logs.filter(l => l.status === 'Leave').length;

            container.innerHTML = staff.map(s => {
                const log = logs.find(l => l.staff_id === s.id);
                const status = log ? log.status : 'None';
                
                return `
                <div class="staff-att-card">
                    <div class="att-header">
                        <div>
                            <div class="staff-name">${s.full_name}</div>
                            <div class="staff-dept">${s.designation || 'Staff'}</div>
                        </div>
                        <div style="font-size:0.6rem; color:#94a3b8">ID: ${s.id.slice(0,5)}</div>
                    </div>

                    <div class="btn-group">
                        <button class="att-btn ${status === 'Present' ? 'active-p' : ''}" onclick="markAtt('${s.id}', 'Present')">P</button>
                        <button class="att-btn ${status === 'Absent' ? 'active-a' : ''}" onclick="markAtt('${s.id}', 'Absent')">A</button>
                        <button class="att-btn ${status === 'Half Day' ? 'active-h' : ''}" onclick="markAtt('${s.id}', 'Half Day')">1/2</button>
                        <button class="att-btn ${status === 'Leave' ? 'active-h' : ''}" onclick="markAtt('${s.id}', 'Leave')">L</button>
                    </div>

                    ${status === 'Present' || status === 'Half Day' ? `
                    <div class="time-row">
                        <div class="time-box">IN <span>${log.check_in || '--:--'}</span></div>
                        <div class="time-box">OUT <span onclick="setOutTime('${log.id}')" style="color:#3b82f6">${log.check_out || 'SET OUT'}</span></div>
                        <div class="time-box">HOURS <span>${log.total_hours || '0'}h</span></div>
                    </div>
                    ` : ''}
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.markAtt = async (staffId, status) => {
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            
            const { error } = await sb.from('attendance').upsert({
                business_id: bID,
                staff_id: staffId,
                date: today,
                status: status,
                check_in: (status === 'Present' || status === 'Half Day') ? time : null
            }, { onConflict: 'staff_id, date' });

            if(error) alert(error.message);
            else loadAttendance();
        };

        window.setOutTime = async (logId) => {
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            await sb.from('attendance').update({ check_out: time }).eq('id', logId);
            loadAttendance();
        };

        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

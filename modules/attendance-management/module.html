<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Attendance - Brain OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #1e293b; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.7rem; text-decoration: none; flex: 1; gap: 4px; }
        .nav-item.active { color: #3b82f6; }
        .main-container { padding: 75px 15px 100px; min-height: 100vh; background: #0f172a; color: white; }

        /* Navigation & Toggles */
        .date-bar { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; background: #1e293b; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .date-display { font-weight: 700; font-size: 1rem; color: #3b82f6; }
        
        .toggle-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab { flex: 1; background: #1e293b; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.75rem; font-weight: 700; color: #94a3b8; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .tab.active { background: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }

        /* Attendance Cards */
        .att-card { background: #1e293b; border-radius: 16px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .att-name { font-weight: 700; font-size: 1rem; margin-bottom: 2px; }
        .att-sub { font-size: 0.75rem; color: #94a3b8; margin-bottom: 15px; }

        .btn-row { display: flex; gap: 10px; }
        .btn-att { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; font-weight: 800; cursor: pointer; font-size: 0.85rem; }
        .btn-att.active-p { background: #22c55e; border-color: #22c55e; }
        .btn-att.active-a { background: #ef4444; border-color: #ef4444; }
        .btn-att.active-h { background: #f59e0b; border-color: #f59e0b; }
        .btn-att.active-l { background: #8b5cf6; border-color: #8b5cf6; }
    </style>
</head>
<body>

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div onclick="location.href='../../workspace.html'" style="cursor:pointer"><i data-lucide="chevron-left"></i></div>
            <span style="font-weight: 700;">Smart Attendance</span>
        </div>
        <i data-lucide="calendar" size="20" style="color: #3b82f6;"></i>
    </header>

    <main class="main-container">
        
        <!-- Date Selector -->
        <div class="date-bar">
            <div onclick="changeDate(-1)" style="cursor:pointer"><i data-lucide="chevron-left" size="20"></i></div>
            <div class="date-display" id="date-text">Loading...</div>
            <div id="next-btn" onclick="changeDate(1)" style="cursor:pointer"><i data-lucide="chevron-right" size="20"></i></div>
        </div>

        <!-- Mode Toggle (General / Shift-wise) -->
        <div class="toggle-group">
            <div class="tab active" id="m-gen" onclick="setMode('General')">General</div>
            <div class="tab" id="m-shift" onclick="setMode('Shift-wise')">Shift-wise</div>
        </div>

        <!-- Shift Sub-Toggles (Dynamic) -->
        <div class="toggle-group" id="shift-container">
            <!-- Toggles will be injected here -->
        </div>

        <!-- List -->
        <div id="staff-list">
            <p style="text-align: center; color: gray; margin-top: 50px;">Initializing Attendance...</p>
        </div>

    </main>

    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script>
        const SB_URL = 'https://leeildsotoqjakirlqsx.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlZWlsZHNvdG9xamFraXJscXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjEyNzEsImV4cCI6MjA5NTEzNzI3MX0.0dxnUHBD-4RyBEQlCGhFjZKd0kA4aRUyOmo3cGhxYjc';
        let sb, bID = null;

        let viewingDate = new Date();
        let currentMode = 'General';
        let currentShift = 'Day';

        window.onload = async () => {
            lucide.createIcons();
            sb = window.supabase.createClient(SB_URL, SB_KEY);
            const { data: { user } } = await sb.auth.getUser();
            if(!user) return window.location.href = '../../login.html';
            const { data: biz } = await sb.from('businesses').select('id').eq('owner_id', user.id).maybeSingle();
            bID = biz.id;
            
            renderShiftToggles();
            updateUI();
        };

        function renderShiftToggles() {
            const container = document.getElementById('shift-container');
            if(currentMode === 'General') {
                container.innerHTML = `
                    <div class="tab ${currentShift === 'Day' ? 'active' : ''}" onclick="setShift('Day')">Day</div>
                    <div class="tab ${currentShift === 'Night' ? 'active' : ''}" onclick="setShift('Night')">Night</div>
                `;
            } else {
                container.innerHTML = `
                    <div class="tab ${currentShift === '6 am - 2 pm' ? 'active' : ''}" onclick="setShift('6 am - 2 pm')">6-2</div>
                    <div class="tab ${currentShift === '2 pm - 10 pm' ? 'active' : ''}" onclick="setShift('2 pm - 10 pm')">2-10</div>
                    <div class="tab ${currentShift === '10 pm - 6 am' ? 'active' : ''}" onclick="setShift('10 pm - 6 am')">10-6</div>
                `;
            }
        }

        function updateUI() {
            const options = { day: 'numeric', month: 'short' };
            document.getElementById('date-text').innerText = viewingDate.toLocaleDateString('en-GB', options);
            
            // Block Future Dates
            const today = new Date(); today.setHours(0,0,0,0);
            const vDate = new Date(viewingDate); vDate.setHours(0,0,0,0);
            document.getElementById('next-btn').style.opacity = vDate >= today ? "0.2" : "1";
            document.getElementById('next-btn').style.pointerEvents = vDate >= today ? "none" : "auto";

            loadAttendance();
        }

        async function loadAttendance() {
            const list = document.getElementById('staff-list');
            const dateStr = viewingDate.toISOString().split('T')[0];

            const { data: staff } = await sb.from('staff').select('*').eq('business_id', bID).eq('status', 'Active');
            const { data: logs } = await sb.from('attendance').select('*').eq('business_id', bID).eq('date', dateStr).eq('shift_name', currentShift);

            if(!staff || staff.length === 0) {
                list.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:50px;">Add Staff in Manager first.</p>`;
                return;
            }

            list.innerHTML = staff.map(s => {
                const log = logs.find(l => l.staff_id === s.id);
                const status = log ? log.status : 'None';
                
                // Logic based on requirements
                let buttons = '';
                if(currentMode === 'General' && currentShift === 'Day') {
                    buttons = `
                        <button class="btn-att ${status === 'Present' ? 'active-p' : ''}" onclick="mark('${s.id}', 'Present')">P</button>
                        <button class="btn-att ${status === 'Absent' ? 'active-a' : ''}" onclick="mark('${s.id}', 'Absent')">A</button>
                        <button class="btn-att ${status === 'Leave' ? 'active-l' : ''}" onclick="mark('${s.id}', 'Leave')">L</button>
                    `;
                } else if(currentMode === 'General' && currentShift === 'Night') {
                    buttons = `
                        <button class="btn-att ${status === 'Present' ? 'active-p' : ''}" onclick="mark('${s.id}', 'Present')">P</button>
                        <button class="btn-att ${status === 'Absent' ? 'active-a' : ''}" onclick="mark('${s.id}', 'Absent')">A</button>
                        <button class="btn-att ${status === 'Half Day' ? 'active-h' : ''}" onclick="mark('${s.id}', 'Half Day')">1/2</button>
                    `;
                } else {
                    // Shift-wise (6-2, 2-10, 10-6)
                    buttons = `
                        <button class="btn-att ${status === 'Present' ? 'active-p' : ''}" onclick="mark('${s.id}', 'Present')">P</button>
                        <button class="btn-att ${status === 'Absent' ? 'active-a' : ''}" onclick="mark('${s.id}', 'Absent')">A</button>
                    `;
                }

                return `
                <div class="att-card">
                    <div class="att-name">${s.full_name}</div>
                    <div class="att-sub">${s.designation || 'Staff'} • #${s.id.slice(0,4)}</div>
                    <div class="btn-row">${buttons}</div>
                </div>`;
            }).join('');
        }

        window.mark = async (staffId, status) => {
            const dateStr = viewingDate.toISOString().split('T')[0];
            const { error } = await sb.from('attendance').upsert({
                business_id: bID, staff_id: staffId, date: dateStr, status: status, shift_name: currentShift
            }, { onConflict: 'staff_id, date, shift_name' });
            
            if(!error) loadAttendance(); else alert(error.message);
        };

        window.changeDate = (val) => { viewingDate.setDate(viewingDate.getDate() + val); updateUI(); };
        
        window.setMode = (m) => { 
            currentMode = m; 
            currentShift = (m === 'General') ? 'Day' : '6 am - 2 pm';
            document.getElementById('m-gen').classList.toggle('active', m === 'General');
            document.getElementById('m-shift').classList.toggle('active', m === 'Shift-wise');
            renderShiftToggles();
            loadAttendance();
        };

        window.setShift = (s) => { currentShift = s; renderShiftToggles(); loadAttendance(); };

        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

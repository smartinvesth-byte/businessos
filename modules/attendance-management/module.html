<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Attendance - Brain OS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">

    <style>
        /* UI CONSISTENCY */
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #1e293b; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.7rem; text-decoration: none; flex: 1; gap: 4px; }
        .nav-item.active { color: #3b82f6; }
        
        .main-container { padding: 75px 15px 110px; min-height: 100vh; background: #0f172a; color: white; }

        /* Date Controller */
        .date-control { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; background: #1e293b; padding: 12px; border-radius: 12px; }
        .date-val { font-weight: 700; font-size: 1rem; color: #3b82f6; }

        /* Mode & Shift Toggles */
        .tab-box { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; background: #1e293b; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.75rem; font-weight: 700; color: #94a3b8; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }

        /* Summary Stats */
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #1e293b; padding: 15px 10px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card small { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .stat-card b { font-size: 1.2rem; }

        /* Staff Cards */
        .staff-card { background: #1e293b; border-radius: 16px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .st-name { font-weight: 700; font-size: 1rem; }
        .st-sub { font-size: 0.75rem; color: #94a3b8; margin-bottom: 15px; }

        .btn-row { display: flex; gap: 8px; }
        .btn-mark { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; font-weight: 800; cursor: pointer; font-size: 0.8rem; }
        .btn-mark.active-p { background: #22c55e; border-color: #22c55e; }
        .btn-mark.active-a { background: #ef4444; border-color: #ef4444; }
        .btn-mark.active-h { background: #f59e0b; border-color: #f59e0b; }
        .btn-mark.active-l { background: #8b5cf6; border-color: #8b5cf6; }
    </style>
</head>
<body>

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div onclick="location.href='../../workspace.html'" style="cursor:pointer"><i data-lucide="chevron-left"></i></div>
            <span style="font-weight: 700;">Smart Attendance</span>
        </div>
        <div onclick="alert('Monthly Report module will be linked here.')" style="cursor:pointer">
            <i data-lucide="file-spreadsheet" style="color: #3b82f6;"></i>
        </div>
    </header>

    <main class="main-container">
        
        <!-- Date Selector -->
        <div class="date-control">
            <div onclick="changeDate(-1)" style="cursor:pointer"><i data-lucide="chevron-left" size="20"></i></div>
            <div class="date-val" id="display-date">Loading...</div>
            <div id="next-date-btn" onclick="changeDate(1)" style="cursor:pointer"><i data-lucide="chevron-right" size="20"></i></div>
        </div>

        <!-- Mode Toggle -->
        <div class="tab-box">
            <div class="tab-btn active" id="mode-gen" onclick="toggleMode('General')">General</div>
            <div class="tab-btn" id="mode-shift" onclick="toggleMode('Shift-wise')">Shift-wise</div>
        </div>

        <!-- Shift Selectors (Dynamic) -->
        <div class="tab-box" id="shift-selectors"></div>

        <!-- Stats Summary (Real-time Report) -->
        <div class="stats-summary">
            <div class="stat-card"><small>Present</small><b id="count-p" style="color:#22c55e">0</b></div>
            <div class="stat-card"><small>Absent</small><b id="count-a" style="color:#ef4444">0</b></div>
            <div class="stat-card"><small>Leave</small><b id="count-l" style="color:#8b5cf6">0</b></div>
        </div>

        <!-- Staff List Container -->
        <div id="attendance-list-area">
            <p style="text-align: center; color: gray; margin-top: 50px;">Fetching records...</p>
        </div>

    </main>

    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script>
        // CONFIG
        const SB_URL = 'https://leeildsotoqjakirlqsx.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlZWlsZHNvdG9xamFraXJscXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjEyNzEsImV4cCI6MjA5NTEzNzI3MX0.0dxnUHBD-4RyBEQlCGhFjZKd0kA4aRUyOmo3cGhxYjc';
        
        let sb, bID = null;
        let viewingDate = new Date();
        let curMode = 'General';
        let curShift = 'Day';
        let allStaffData = []; // Global storage for validation

        window.onload = async () => {
            lucide.createIcons();
            try {
                sb = window.supabase.createClient(SB_URL, SB_KEY);
                const { data: { user } } = await sb.auth.getUser();
                if(!user) return window.location.href = '../../login.html';
                const { data: biz } = await sb.from('businesses').select('id').eq('owner_id', user.id).maybeSingle();
                bID = biz.id;
                
                renderShiftUI();
                refreshAttendanceUI();
            } catch (e) { console.error(e); }
        };

        function renderShiftUI() {
            const box = document.getElementById('shift-selectors');
            if(curMode === 'General') {
                box.innerHTML = `
                    <div class="tab-btn ${curShift === 'Day' ? 'active' : ''}" onclick="setShift('Day')">Day</div>
                    <div class="tab-btn ${curShift === 'Night' ? 'active' : ''}" onclick="setShift('Night')">Night</div>
                `;
            } else {
                box.innerHTML = `
                    <div class="tab-btn ${curShift === '6 am - 2 pm' ? 'active' : ''}" onclick="setShift('6 am - 2 pm')">6-2</div>
                    <div class="tab-btn ${curShift === '2 pm - 10 pm' ? 'active' : ''}" onclick="setShift('2 pm - 10 pm')">2-10</div>
                    <div class="tab-btn ${curShift === '10 pm - 6 am' ? 'active' : ''}" onclick="setShift('10 pm - 6 am')">10-6</div>
                `;
            }
        }

        function refreshAttendanceUI() {
            const options = { day: 'numeric', month: 'short' };
            document.getElementById('display-date').innerText = viewingDate.toLocaleDateString('en-GB', options);
            
            // Block Next Date
            const today = new Date(); today.setHours(0,0,0,0);
            const checkDate = new Date(viewingDate); checkDate.setHours(0,0,0,0);
            document.getElementById('next-date-btn').style.opacity = checkDate >= today ? "0.2" : "1";
            document.getElementById('next-date-btn').style.pointerEvents = checkDate >= today ? "none" : "auto";

            loadAttendance();
        }

        async function loadAttendance() {
            const listArea = document.getElementById('attendance-list-area');
            const dateStr = viewingDate.toISOString().split('T')[0];

            // 1. Fetch Active Staff
            const { data: staff } = await sb.from('staff').select('*').eq('business_id', bID).eq('status', 'Active');
            allStaffData = staff || [];

            // 2. Fetch Logs for specific Date and Shift
            const { data: logs } = await sb.from('attendance').select('*').eq('business_id', bID).eq('date', dateStr).eq('shift_name', curShift);

            if(!staff || staff.length === 0) {
                listArea.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:50px;">No active staff found.</p>`;
                return;
            }

            // Update Summary Stats
            document.getElementById('count-p').innerText = logs.filter(l => l.status === 'Present').length;
            document.getElementById('count-a').innerText = logs.filter(l => l.status === 'Absent').length;
            document.getElementById('count-l').innerText = logs.filter(l => l.status === 'Leave').length;

            listArea.innerHTML = staff.map(s => {
                const log = logs.find(l => l.staff_id === s.id);
                const status = log ? log.status : 'None';
                
                let buttons = '';
                // GENERAL MODE UI
                if(curMode === 'General') {
                    buttons = `
                        <button class="btn-mark ${status === 'Present' ? 'active-p' : ''}" onclick="mark('${s.id}', 'Present')">P</button>
                        <button class="btn-mark ${status === 'Absent' ? 'active-a' : ''}" onclick="mark('${s.id}', 'Absent')">A</button>
                        <button class="btn-mark ${status === 'Half Day' ? 'active-h' : ''}" onclick="mark('${s.id}', 'Half Day')">1/2</button>
                        <button class="btn-mark ${status === 'Leave' ? 'active-l' : ''}" onclick="mark('${s.id}', 'Leave')">L</button>
                    `;
                } else {
                    // SHIFT-WISE MODE UI (Only P & A as requested)
                    buttons = `
                        <button class="btn-mark ${status === 'Present' ? 'active-p' : ''}" onclick="mark('${s.id}', 'Present')">P</button>
                        <button class="btn-mark ${status === 'Absent' ? 'active-a' : ''}" onclick="mark('${s.id}', 'Absent')">A</button>
                    `;
                }

                return `
                <div class="staff-card">
                    <div class="st-name">${s.full_name}</div>
                    <div class="st-sub">${s.designation || 'Staff'} • <span style="color:#3b82f6">${s.attendance_type} Member</span></div>
                    <div class="btn-row">${buttons}</div>
                </div>`;
            }).join('');
        }

        window.mark = async (sId, st) => {
            // --- VALIDATION LOGIC ---
            const staff = allStaffData.find(x => x.id === sId);
            if(staff.attendance_type !== curMode) {
                alert(`Your staff job type is ${staff.attendance_type} so you cannot select any options from ${curMode}.`);
                return;
            }

            const dateStr = viewingDate.toISOString().split('T')[0];
            const { error } = await sb.from('attendance').upsert({
                business_id: bID, staff_id: sId, date: dateStr, status: st, shift_name: curShift
            }, { onConflict: 'staff_id, date, shift_name' });
            
            if(!error) loadAttendance(); else alert(error.message);
        };

        window.changeDate = (val) => { viewingDate.setDate(viewingDate.getDate() + val); refreshAttendanceUI(); };
        
        window.toggleMode = (m) => { 
            curMode = m; 
            curShift = (m === 'General') ? 'Day' : '6 am - 2 pm';
            document.getElementById('mode-gen').classList.toggle('active', m === 'General');
            document.getElementById('mode-shift').classList.toggle('active', m === 'Shift-wise');
            renderShiftUI();
            loadAttendance();
        };

        window.setShift = (s) => { curShift = s; renderShiftUI(); loadAttendance(); };

        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

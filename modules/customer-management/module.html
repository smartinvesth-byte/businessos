<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Manager - Business Brain OS</title>
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* UI CONSISTENCY FIX */
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; gap: 4px; }
        .nav-item.active { color: var(--accent-color); }
        .container { padding: 80px 15px 100px; }

        /* SEARCH & ADD UI */
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; display: flex; align-items: center; padding: 0 12px; }
        .search-box input { border: none; background: transparent; color: white; width: 100%; padding: 12px 5px; outline: none; }
        .add-btn { background: var(--accent-color); color: white; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 4px 12px var(--accent-glow); }

        /* LIST CARD DESIGN */
        .cust-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 15px; }
        .cust-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .cust-name { font-weight: 700; font-size: 1rem; }
        .stat-grid { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; }
        .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-val { font-size: 0.85rem; font-weight: 700; }
        .actions { display: flex; justify-content: flex-end; gap: 20px; margin-top: 15px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .act-btn { font-size: 0.75rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-dark">

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="chevron-left" onclick="location.href='../../workspace.html'"></i>
            <span style="font-weight: 700;">Customer Manager</span>
        </div>
        <i data-lucide="refresh-cw" size="20" onclick="location.reload()"></i>
    </header>

    <main class="container">
        <div class="action-bar">
            <div class="search-box">
                <i data-lucide="search" size="18" style="color:var(--text-muted)"></i>
                <input type="text" id="cust-search" placeholder="Search customers...">
            </div>
            <button class="add-btn" id="open-modal-btn"><i data-lucide="plus" size="24"></i></button>
        </div>

        <div id="customer-list-container">
            <p style="text-align:center; color:gray; margin-top:50px;">Connecting to Systems...</p>
        </div>
    </main>

    <!-- Modal Form -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3 id="modal-title">New Customer</h3>
                <i data-lucide="x" onclick="closeModal()"></i>
            </div>
            <input type="hidden" id="edit-id">
            <div class="form-group"><label>Full Name *</label><input type="text" id="f-name"></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="f-phone"></div>
            <div class="form-group"><label>Address</label><input type="text" id="f-addr"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
                <div class="form-group"><label>Total Amount</label><input type="number" id="f-total" value="0"></div>
                <div class="form-group"><label>Paid Amount</label><input type="number" id="f-paid" value="0"></div>
            </div>
            <div class="form-group">
                <label>Remaining Balance</label>
                <input type="number" id="f-rem" readonly style="background:rgba(34,197,94,0.1); color:var(--success); font-weight:800;">
            </div>
            <button class="btn btn-primary" id="save-btn" style="width: 100%; margin-top: 10px; height: 50px;">Save Customer</button>
        </div>
    </div>

    <!-- Universal Bottom Nav -->
    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script>
        // MASTER CONNECTION (Hardcoded for stability)
        const SB_URL = 'https://leeildsotoqjakirlqsx.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlZWlsZHNvdG9xamFraXJscXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjEyNzEsImV4cCI6MjA5NTEzNzI3MX0.0dxnUHBD-4RyBEQlCGhFjZKd0kA4aRUyOmo3cGhxYjc'; // <--- APNI REAL KEY DALO BHAI
        
        let client;
        let bizId = null;

        // Auto Calc
        document.getElementById('f-total').oninput = document.getElementById('f-paid').oninput = () => {
            const t = parseFloat(document.getElementById('f-total').value) || 0;
            const p = parseFloat(document.getElementById('f-paid').value) || 0;
            document.getElementById('f-rem').value = (t - p).toFixed(2);
        };

        async function init() {
            try {
                client = window.supabase.createClient(SB_URL, SB_KEY);
                const { data: { user } } = await client.auth.getUser();
                if(!user) return window.location.href = '../../login.html';

                const { data: biz } = await client.from('businesses').select('id').eq('owner_id', user.id).maybeSingle();
                bizId = biz?.id;
                
                loadList();
            } catch (e) {
                document.getElementById('customer-list-container').innerHTML = "Connection Error. Check Internet.";
            }
        }

        async function loadList(search = '') {
            const list = document.getElementById('customer-list-container');
            let query = client.from('customers').select('*').eq('business_id', bizId);
            if(search) query = query.ilike('name', `%${search}%`);

            const { data, error } = await query.order('created_at', { ascending: false });

            if(error) { list.innerHTML = "Error loading data."; return; }
            if(!data || data.length === 0) {
                list.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:50px;">No customers added yet.</p>`;
                lucide.createIcons();
                return;
            }

            list.innerHTML = data.map(c => `
                <div class="cust-card">
                    <div class="cust-header">
                        <div><div class="cust-name">${c.name}</div><div style="font-size:0.75rem; color:gray">${c.phone || ''}</div></div>
                        <div style="text-align:right; font-size:0.7rem; color:gray">${c.address || ''}</div>
                    </div>
                    <div class="stat-grid">
                        <div><span class="stat-label">Total</span><div class="stat-val">₹${c.total_amount}</div></div>
                        <div><span class="stat-label">Paid</span><div class="stat-val" style="color:var(--success)">₹${c.advance_paid}</div></div>
                        <div><span class="stat-label">Balance</span><div class="stat-val" style="color:var(--warning)">₹${c.remaining_balance}</div></div>
                    </div>
                    <div class="actions">
                        <span class="act-btn" onclick="editCust('${c.id}')"><i data-lucide="edit-3" size="14"></i> UPDATE</span>
                        <span class="act-btn" style="color:var(--danger)" onclick="deleteCust('${c.id}')"><i data-lucide="trash-2" size="14"></i> REMOVE</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        document.getElementById('save-btn').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const payload = {
                business_id: bizId,
                name: document.getElementById('f-name').value,
                phone: document.getElementById('f-phone').value,
                address: document.getElementById('f-addr').value,
                total_amount: parseFloat(document.getElementById('f-total').value) || 0,
                advance_paid: parseFloat(document.getElementById('f-paid').value) || 0,
                remaining_balance: parseFloat(document.getElementById('f-rem').value) || 0
            };
            if(!payload.name) return alert("Enter Name");
            const { error } = id ? await client.from('customers').update(payload).eq('id', id) : await client.from('customers').insert([payload]);
            if(!error) { closeModal(); loadList(); } else { alert(error.message); }
        };

        window.editCust = async (id) => {
            const { data } = await client.from('customers').select('*').eq('id', id).single();
            document.getElementById('edit-id').value = data.id;
            document.getElementById('f-name').value = data.name;
            document.getElementById('f-phone').value = data.phone;
            document.getElementById('f-addr').value = data.address;
            document.getElementById('f-total').value = data.total_amount;
            document.getElementById('f-paid').value = data.advance_paid;
            document.getElementById('f-rem').value = data.remaining_balance;
            document.getElementById('modal-title').innerText = "Update Customer";
            document.getElementById('modal').classList.add('active');
        };

        window.deleteCust = async (id) => {
            if(confirm("Delete this customer?")) { await client.from('customers').delete().eq('id', id); loadList(); }
        };

        document.getElementById('open-modal-btn').onclick = () => {
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-title').innerText = "New Customer";
            document.querySelectorAll('#modal input').forEach(i => i.value = (i.type === 'number' ? 0 : ''));
            document.getElementById('modal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('active');
        document.getElementById('cust-search').oninput = (e) => loadList(e.target.value);

        window.onload = init;
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Manager - Brain OS</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent-color); }
        .container { padding: 80px 20px 100px; }
        
        /* Action Bar */
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 12px; border-radius: 12px; }
        .search-box input { border: none; background: transparent; color: white; padding: 12px 5px; width: 100%; outline: none; }
        .add-btn { background: var(--accent-color); color: white; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: none; }

        /* Customer Card */
        .customer-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 15px; }
        .balance-strip { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; margin-top: 12px; }
        .bal-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; display: block; }
        .bal-val { font-size: 0.9rem; font-weight: 700; }
        
        .card-actions { display: flex; justify-content: flex-end; gap: 20px; margin-top: 15px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .act-btn { font-size: 0.75rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-dark">

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="chevron-left" onclick="location.href='../../workspace.html'" style="cursor:pointer"></i>
            <span style="font-weight: 700; font-size: 1.1rem;">Customer Manager</span>
        </div>
        <i data-lucide="refresh-cw" size="20" id="btn-refresh" style="cursor:pointer"></i>
    </header>

    <main class="container">
        <div class="action-bar">
            <div class="search-box">
                <i data-lucide="search" size="18" style="color:var(--text-muted)"></i>
                <input type="text" id="cust-search" placeholder="Search customers...">
            </div>
            <button class="add-btn" id="btn-add"><i data-lucide="plus"></i></button>
        </div>

        <div id="list-container">
            <p style="text-align: center; color: var(--text-muted); margin-top: 40px;">Syncing with database...</p>
        </div>
    </main>

    <!-- Modal Form -->
    <div class="modal" id="cust-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 id="modal-title">New Customer</h3>
                <i data-lucide="x" onclick="closeModal()" style="cursor:pointer"></i>
            </div>
            
            <input type="hidden" id="edit-id">
            <div class="form-group"><label>Full Name *</label><input type="text" id="f-name"></div>
            <div class="form-group"><label>Mobile Number</label><input type="tel" id="f-phone"></div>
            <div class="form-group"><label>Address</label><input type="text" id="f-addr"></div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
                <div class="form-group"><label>Total Amount</label><input type="number" id="f-total" value="0"></div>
                <div class="form-group"><label>Advance Paid</label><input type="number" id="f-paid" value="0"></div>
            </div>
            <div class="form-group">
                <label>Remaining Balance</label>
                <input type="number" id="f-rem" value="0" readonly style="background:rgba(34,197,94,0.1); color:var(--success); font-weight:800;">
            </div>

            <button class="btn btn-primary" id="btn-save" style="width: 100%; margin-top: 10px;">Save Customer</button>
        </div>
    </div>

    <!-- Universal Bottom Nav -->
    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from '../../database/supabase.js';
        lucide.createIcons();

        let bizId = null;

        // Auto Calculation
        const updateBal = () => {
            const t = parseFloat(document.getElementById('f-total').value) || 0;
            const p = parseFloat(document.getElementById('f-paid').value) || 0;
            document.getElementById('f-rem').value = (t - p).toFixed(2);
        };
        document.getElementById('f-total').oninput = updateBal;
        document.getElementById('f-paid').oninput = updateBal;

        // 1. Get Business Context First
        async function loadApp() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) return window.location.href = '../../login.html';

                const { data: biz } = await supabase.from('businesses').select('id').eq('owner_id', user.id).single();
                if (biz) {
                    bizId = biz.id;
                    loadList();
                } else {
                    document.getElementById('list-container').innerHTML = "Business Profile not found.";
                }
            } catch (e) {
                document.getElementById('list-container').innerHTML = "Connection Error. Try refreshing.";
            }
        }

        // 2. Load List with Business ID check
        async function loadList(search = '') {
            if (!bizId) return;
            const container = document.getElementById('list-container');
            
            let query = supabase.from('customers').select('*').eq('business_id', bizId);
            if (search) query = query.ilike('name', `%${search}%`);

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<p style="color:red; text-align:center">Error: ${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:40px;">No customers found.</p>`;
                return;
            }

            container.innerHTML = data.map(c => `
                <div class="customer-card">
                    <div style="display:flex; justify-content:space-between">
                        <div>
                            <div style="font-weight:700">${c.name}</div>
                            <div style="font-size:0.75rem; color:gray">${c.phone || 'No Mobile'}</div>
                        </div>
                        <div style="text-align:right; font-size:0.7rem; color:gray">${c.address || ''}</div>
                    </div>
                    <div class="balance-strip">
                        <div class="bal-item"><span class="bal-label">Total</span><span class="bal-val">₹${c.total_amount}</span></div>
                        <div class="bal-item"><span class="bal-label">Paid</span><span class="bal-val" style="color:var(--success)">₹${c.advance_paid}</span></div>
                        <div class="bal-item"><span class="bal-label">Balance</span><span class="bal-val" style="color:var(--warning)">₹${c.remaining_balance}</span></div>
                    </div>
                    <div class="card-actions">
                        <span class="act-btn" onclick="editCust('${c.id}')"><i data-lucide="edit-2" size="14" style="color:var(--accent-color)"></i> EDIT</span>
                        <span class="act-btn" onclick="delCust('${c.id}')" style="color:var(--danger)"><i data-lucide="trash-2" size="14"></i> REMOVE</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 3. Save / Update Logic
        document.getElementById('btn-save').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const btn = document.getElementById('btn-save');
            btn.disabled = true;

            const payload = {
                business_id: bizId,
                name: document.getElementById('f-name').value,
                phone: document.getElementById('f-phone').value,
                address: document.getElementById('f-addr').value,
                total_amount: parseFloat(document.getElementById('f-total').value) || 0,
                advance_paid: parseFloat(document.getElementById('f-paid').value) || 0,
                remaining_balance: parseFloat(document.getElementById('f-rem').value) || 0
            };

            if (!payload.name) return alert("Enter customer name");

            const { error } = id ? await supabase.from('customers').update(payload).eq('id', id) : await supabase.from('customers').insert([payload]);

            if (error) alert(error.message);
            else { closeModal(); loadList(); }
            btn.disabled = false;
        };

        // Window Functions
        window.editCust = async (id) => {
            const { data } = await supabase.from('customers').select('*').eq('id', id).single();
            document.getElementById('edit-id').value = data.id;
            document.getElementById('f-name').value = data.name;
            document.getElementById('f-phone').value = data.phone;
            document.getElementById('f-addr').value = data.address;
            document.getElementById('f-total').value = data.total_amount;
            document.getElementById('f-paid').value = data.advance_paid;
            document.getElementById('f-rem').value = data.remaining_balance;
            document.getElementById('modal-title').innerText = "Update Customer";
            document.getElementById('cust-modal').classList.add('active');
        };

        window.delCust = async (id) => {
            if (confirm("Delete this customer?")) {
                await supabase.from('customers').delete().eq('id', id);
                loadList();
            }
        };

        document.getElementById('btn-add').onclick = () => {
            document.getElementById('edit-id').value = '';
            document.querySelectorAll('.modal-content input').forEach(i => i.value = (i.type === 'number' ? 0 : ''));
            document.getElementById('modal-title').innerText = "New Customer";
            document.getElementById('cust-modal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('cust-modal').classList.remove('active');
        document.getElementById('cust-search').oninput = (e) => loadList(e.target.value);
        document.getElementById('btn-refresh').onclick = () => location.reload();

        loadApp();
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

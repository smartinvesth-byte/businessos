<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Manager - Business Brain OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #1e293b; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.7rem; text-decoration: none; flex: 1; gap: 4px; }
        .nav-item.active { color: #3b82f6; }
        .container-main { padding: 80px 15px 100px; min-height: 100vh; background: #0f172a; color: white; font-family: sans-serif; }
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .search-box { flex: 1; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; padding: 0 12px; height: 48px; }
        .search-box input { border: none; background: transparent; color: white; width: 100%; outline: none; font-size: 0.9rem; }
        .add-btn-main { background: #3b82f6; color: white; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
        .cust-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; margin-bottom: 15px; }
        .stat-strip { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; margin-top: 12px; }
        .s-val { font-size: 0.85rem; font-weight: 700; }
        .btn-row { display: flex; justify-content: flex-end; gap: 20px; margin-top: 15px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        .act-btn { font-size: 0.7rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #94a3b8; border: none; background: none; }
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: flex-end; }
        .modal-bg.active { display: flex; }
        .modal-sheet { background: #1e293b; width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div onclick="location.href='../../workspace.html'" style="cursor:pointer"><i data-lucide="chevron-left"></i></div>
            <span style="font-weight: 700;">Customer Manager</span>
        </div>
        <i data-lucide="refresh-cw" size="20" onclick="location.reload()" style="cursor:pointer"></i>
    </header>

    <main class="container-main">
        <div class="action-bar">
            <div class="search-box">
                <i data-lucide="search" size="18" style="color:#94a3b8"></i>
                <input type="text" id="search-input" placeholder="Search by name...">
            </div>
            <button class="add-btn-main" id="add-trigger"><i data-lucide="plus" size="24"></i></button>
        </div>
        <div id="list-area"><p style="text-align:center; color:gray; margin-top:50px;">Connecting...</p></div>
    </main>

    <div class="modal-bg" id="modal-container">
        <div class="modal-sheet">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3 id="m-header">New Customer</h3>
                <div onclick="closeModal()" style="cursor:pointer"><i data-lucide="x"></i></div>
            </div>
            <input type="hidden" id="edit-id">
            <div style="margin-bottom:15px;"><label style="font-size:0.7rem; color:gray;">Name</label><input type="text" id="f-name" style="width:100%; padding:12px; background:#0f172a; border:1px solid #334155; color:white; border-radius:8px;"></div>
            <div style="margin-bottom:15px;"><label style="font-size:0.7rem; color:gray;">Mobile</label><input type="tel" id="f-phone" style="width:100%; padding:12px; background:#0f172a; border:1px solid #334155; color:white; border-radius:8px;"></div>
            <div style="margin-bottom:15px;"><label style="font-size:0.7rem; color:gray;">Address</label><input type="text" id="f-addr" style="width:100%; padding:12px; background:#0f172a; border:1px solid #334155; color:white; border-radius:8px;"></div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label style="font-size:0.7rem; color:gray;">Total Amount</label><input type="number" id="f-total" value="0" style="width:100%; padding:12px; background:#0f172a; border:1px solid #334155; color:white; border-radius:8px;"></div>
                <div><label style="font-size:0.7rem; color:gray;">Paid Amount</label><input type="number" id="f-paid" value="0" style="width:100%; padding:12px; background:#0f172a; border:1px solid #334155; color:white; border-radius:8px;"></div>
            </div>
            <div style="margin-top:15px;"><label style="font-size:0.7rem; color:gray;">Balance</label><input type="number" id="f-rem" readonly style="width:100%; padding:12px; background:rgba(34,197,94,0.1); border:none; color:#22c55e; border-radius:8px; font-weight:800;"></div>
            
            <button class="add-btn-main" id="save-btn" style="width: 100%; margin-top: 20px; height: 50px;">Save Profile</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script>
        const SB_URL = 'https://leeildsotoqjakirlqsx.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlZWlsZHNvdG9xamFraXJscXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjEyNzEsImV4cCI6MjA5NTEzNzI3MX0.0dxnUHBD-4RyBEQlCGhFjZKd0kA4aRUyOmo3cGhxYjc'; // <--- APNI KEY DALEIN

        let sb, bID = null;

        window.onload = async () => {
            lucide.createIcons();
            try {
                sb = window.supabase.createClient(SB_URL, SB_KEY);
                const { data: { user } } = await sb.auth.getUser();
                if(!user) return window.location.href = '../../login.html';

                // Find Business ID
                let { data: biz } = await sb.from('businesses').select('id').eq('owner_id', user.id).maybeSingle();
                
                // FORCE FIX: If no business found, create one now
                if(!biz) {
                    const { data: newBiz } = await sb.from('businesses').insert([{ owner_id: user.id, business_name: 'My Business' }]).select().single();
                    bID = newBiz.id;
                } else {
                    bID = biz.id;
                }
                
                loadData();
            } catch (err) { document.getElementById('list-area').innerText = "Connection Error."; }
        };

        async function loadData(q = '') {
            const list = document.getElementById('list-area');
            let query = sb.from('customers').select('*').eq('business_id', bID);
            if(q) query = query.ilike('name', `%${q}%`);
            const { data, error } = await query.order('created_at', { ascending: false });

            if(!data || data.length === 0) { list.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:50px;">No customers found.</p>`; return; }

            list.innerHTML = data.map(c => `
                <div class="cust-card">
                    <div class="cust-header">
                        <div><div class="c-name">${c.name}</div><div class="c-sub">${c.phone || ''}</div></div>
                        <div class="c-sub" style="text-align:right">${c.address || ''}</div>
                    </div>
                    <div class="stat-strip">
                        <div><span class="s-label">Total</span><div class="s-val">₹${c.total_amount}</div></div>
                        <div><span class="s-label">Paid</span><div class="s-val" style="color:#22c55e">₹${c.advance_paid}</div></div>
                        <div><span class="s-label">Balance</span><div class="s-val" style="color:#f59e0b">₹${c.remaining_balance}</div></div>
                    </div>
                    <div class="btn-row">
                        <button class="act-btn" onclick="openEdit('${c.id}')"><i data-lucide="edit-3" size="14"></i> UPDATE</button>
                        <button class="act-btn" style="color:#ef4444" onclick="removeCust('${c.id}')"><i data-lucide="trash-2" size="14"></i> REMOVE</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        document.getElementById('save-btn').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const payload = {
                business_id: bID,
                name: document.getElementById('f-name').value,
                phone: document.getElementById('f-phone').value,
                address: document.getElementById('f-addr').value,
                total_amount: parseFloat(document.getElementById('f-total').value) || 0,
                advance_paid: parseFloat(document.getElementById('f-paid').value) || 0,
                remaining_balance: parseFloat(document.getElementById('f-rem').value) || 0
            };
            if(!payload.name) return alert("Enter Name");
            const { error } = id ? await sb.from('customers').update(payload).eq('id', id) : await sb.from('customers').insert([payload]);
            if(!error) { closeModal(); loadData(); } else { alert(error.message); }
        };

        window.openEdit = async (id) => {
            const { data } = await sb.from('customers').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('edit-id').value = data.id;
                document.getElementById('f-name').value = data.name;
                document.getElementById('f-phone').value = data.phone;
                document.getElementById('f-addr').value = data.address;
                document.getElementById('f-total').value = data.total_amount;
                document.getElementById('f-paid').value = data.advance_paid;
                document.getElementById('f-rem').value = data.remaining_balance;
                document.getElementById('m-header').innerText = "Update Record";
                document.getElementById('modal-container').classList.add('active');
            }
        };

        window.removeCust = async (id) => { if(confirm("Delete?")) { await sb.from('customers').delete().eq('id', id); loadData(); } };
        document.getElementById('add-trigger').onclick = () => { document.getElementById('edit-id').value = ''; document.getElementById('m-header').innerText = "New Customer"; document.querySelectorAll('#modal-container input').forEach(i => i.value = (i.type === 'number' ? 0 : '')); document.getElementById('modal-container').classList.add('active'); };
        window.closeModal = () => document.getElementById('modal-container').classList.remove('active');
        document.getElementById('search-input').oninput = (e) => loadData(e.target.value);
        document.getElementById('f-total').oninput = document.getElementById('f-paid').oninput = () => { document.getElementById('f-rem').value = (parseFloat(document.getElementById('f-total').value || 0) - parseFloat(document.getElementById('f-paid').value || 0)).toFixed(2); };
    </script>
</body>
</html>

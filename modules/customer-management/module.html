<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Manager - Brain OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        /* Consistently Styled Bars */
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #1e293b; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.7rem; text-decoration: none; flex: 1; gap: 4px; }
        .nav-item.active { color: #3b82f6; }
        .main-container { padding: 80px 15px 100px; min-height: 100vh; background: #0f172a; }

        /* Search & Add */
        .action-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .search-field { flex: 1; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; padding: 0 12px; height: 48px; }
        .search-field input { border: none; background: transparent; color: white; width: 100%; outline: none; }
        .add-circle { background: #3b82f6; color: white; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }

        /* Modern Card List */
        .cust-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; margin-bottom: 15px; color: white; }
        .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 5px; }
        .stat-row { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; margin-top: 10px; }
        .stat-row small { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; }
        .stat-row div { font-size: 0.85rem; font-weight: 700; }
        .card-btns { display: flex; justify-content: flex-end; gap: 20px; margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .act-btn { font-size: 0.7rem; font-weight: 600; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 4px; }

        /* Modal Sheet */
        .sheet-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: flex-end; }
        .sheet-bg.active { display: flex; }
        .sheet { background: #1e293b; width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; color: white; }
        .form-input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; margin-top: 5px; outline: none; }
    </style>
</head>
<body>

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div onclick="location.href='../../workspace.html'" style="cursor:pointer"><i data-lucide="chevron-left"></i></div>
            <span style="font-weight: 700;">Customer Manager</span>
        </div>
        <i data-lucide="refresh-cw" size="20" onclick="location.reload()" style="cursor:pointer"></i>
    </header>

    <main class="main-container">
        <div class="action-row">
            <div class="search-field">
                <i data-lucide="search" size="18" style="color:#94a3b8"></i>
                <input type="text" id="search-box" placeholder="Search by name...">
            </div>
            <button class="add-circle" id="open-sheet"><i data-lucide="plus" size="24"></i></button>
        </div>

        <div id="customer-list"><p style="text-align: center; color: gray; margin-top: 50px;">Syncing with OS...</p></div>
    </main>

    <!-- Modal Form -->
    <div class="sheet-bg" id="modal-bg">
        <div class="sheet">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3 id="sheet-title">New Customer</h3>
                <div onclick="closeSheet()" style="cursor:pointer"><i data-lucide="x"></i></div>
            </div>
            <input type="hidden" id="edit-id">
            <div style="margin-bottom:15px;"><label>Customer Name *</label><input type="text" id="in-name" class="form-input"></div>
            <div style="margin-bottom:15px;"><label>WhatsApp Number</label><input type="tel" id="in-phone" class="form-input"></div>
            <div style="margin-bottom:15px;"><label>Address</label><input type="text" id="in-addr" class="form-input"></div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Total Amount</label><input type="number" id="in-total" value="0" class="form-input"></div>
                <div><label>Paid Amount</label><input type="number" id="in-paid" value="0" class="form-input"></div>
            </div>
            <div style="margin-top:15px;">
                <label>Remaining Balance</label>
                <input type="number" id="in-rem" readonly class="form-input" style="background:rgba(34,197,94,0.1); color:#22c55e; font-weight:800; border:none;">
            </div>
            <button class="add-circle" id="btn-save" style="width: 100%; margin-top: 20px; height: 50px; font-weight: 700;">Save Profile</button>
        </div>
    </div>

    <!-- Universal Bottom Nav -->
    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script>
        // REPLACE WITH REAL KEYS
        const S_URL = 'https://leeildsotoqjakirlqsx.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlZWlsZHNvdG9xamFraXJscXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjEyNzEsImV4cCI6MjA5NTEzNzI3MX0.0dxnUHBD-4RyBEQlCGhFjZKd0kA4aRUyOmo3cGhxYjc';

        let client, bID = null;

        window.onload = async () => {
            lucide.createIcons();
            if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');

            try {
                client = window.supabase.createClient(S_URL, S_KEY);
                const { data: { user } } = await client.auth.getUser();
                if(!user) { window.location.href = '../../login.html'; return; }

                // Find Business ID
                let { data: biz } = await client.from('businesses').select('id').eq('owner_id', user.id).maybeSingle();
                
                if(!biz) {
                    const { data: newBiz } = await client.from('businesses').insert([{ owner_id: user.id, business_name: 'Main Business' }]).select().single();
                    bID = newBiz.id;
                } else { bID = biz.id; }
                
                loadList();
            } catch (err) { document.getElementById('customer-list').innerText = "Connection Error."; }
        };

        async function loadList(q = '') {
            const container = document.getElementById('customer-list');
            let query = client.from('customers').select('*').eq('business_id', bID);
            if(q) query = query.ilike('name', `%${q}%`);
            
            const { data, error } = await query.order('created_at', { ascending: false });

            if(!data || data.length === 0) { container.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:50px;">No customers added yet.</p>`; return; }

            container.innerHTML = data.map(c => `
                <div class="cust-card">
                    <div style="display:flex; justify-content:space-between">
                        <div><div class="card-title">${c.name}</div><div style="font-size:0.75rem; color:#94a3b8">${c.phone || ''}</div></div>
                        <div style="font-size:0.7rem; color:#94a3b8">${c.address || ''}</div>
                    </div>
                    <div class="stat-row">
                        <div><small>Total</small><div>₹${c.total_amount}</div></div>
                        <div><small>Paid</small><div style="color:#22c55e">₹${c.advance_paid}</div></div>
                        <div><small>Balance</small><div style="color:#f59e0b">₹${c.remaining_balance}</div></div>
                    </div>
                    <div class="card-btns">
                        <div class="act-btn" onclick="openEdit('${c.id}')"><i data-lucide="edit-3" size="14"></i> UPDATE</div>
                        <div class="act-btn" style="color:#ef4444" onclick="handleDelete('${c.id}')"><i data-lucide="trash-2" size="14"></i> REMOVE</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        document.getElementById('btn-save').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const payload = {
                business_id: bID,
                name: document.getElementById('in-name').value,
                phone: document.getElementById('in-phone').value,
                address: document.getElementById('in-addr').value,
                total_amount: parseFloat(document.getElementById('in-total').value || 0),
                advance_paid: parseFloat(document.getElementById('in-paid').value || 0),
                remaining_balance: parseFloat(document.getElementById('in-rem').value || 0)
            };
            if(!payload.name) return alert("Please enter Name");

            const { error } = id ? await client.from('customers').update(payload).eq('id', id) : await client.from('customers').insert([payload]);
            if(!error) { closeSheet(); loadList(); } else { alert(error.message); }
        };

        window.openEdit = async (id) => {
            const { data } = await client.from('customers').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('edit-id').value = data.id;
                document.getElementById('in-name').value = data.name;
                document.getElementById('in-phone').value = data.phone;
                document.getElementById('in-addr').value = data.address;
                document.getElementById('in-total').value = data.total_amount;
                document.getElementById('in-paid').value = data.advance_paid;
                document.getElementById('in-rem').value = data.remaining_balance;
                document.getElementById('sheet-title').innerText = "Update Record";
                document.getElementById('modal-bg').classList.add('active');
            }
        };

        window.handleDelete = async (id) => { if(confirm("Permanently delete?")) { await client.from('customers').delete().eq('id', id); loadList(); } };
        document.getElementById('open-sheet').onclick = () => { document.getElementById('edit-id').value = ''; document.getElementById('sheet-title').innerText = "New Customer"; document.querySelectorAll('#modal-bg input').forEach(i => i.value = (i.type === 'number' ? 0 : '')); document.getElementById('modal-bg').classList.add('active'); };
        window.closeSheet = () => document.getElementById('modal-bg').classList.remove('active');
        document.getElementById('search-box').oninput = (e) => loadList(e.target.value);
        document.getElementById('in-total').oninput = document.getElementById('in-paid').oninput = () => { 
            const t = parseFloat(document.getElementById('in-total').value || 0);
            const p = parseFloat(document.getElementById('in-paid').value || 0);
            document.getElementById('in-rem').value = (t - p).toFixed(2);
        };
    </script>
</body>
</html>

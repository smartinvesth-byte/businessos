<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Manager - Brain OS</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent-color); }
        .container { padding: 80px 20px 100px; }
        
        /* Action Bar */
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 70px; z-index: 900; background: var(--bg-primary); padding-bottom: 10px; }
        .search-box { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 12px; border-radius: 12px; }
        .search-box input { border: none; background: transparent; color: white; padding: 12px 5px; width: 100%; outline: none; }
        .add-btn { background: var(--accent-color); color: white; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 4px 15px var(--accent-glow); }

        /* Customer List Card */
        .customer-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 15px; position: relative; }
        .cust-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .cust-name { font-size: 1.05rem; font-weight: 700; color: var(--text-main); }
        .cust-phone { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; margin-top: 4px; }
        
        .balance-strip { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .balance-item { display: flex; flex-direction: column; }
        .bal-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .bal-value { font-size: 0.9rem; font-weight: 700; }

        .card-actions { display: flex; justify-content: flex-end; gap: 20px; margin-top: 15px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .act-btn { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: 600; cursor: pointer; opacity: 0.8; }
        .act-btn:active { opacity: 1; transform: scale(0.95); }

        /* Modal Bottom Sheet */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 100%; border-radius: 24px 24px 0 0; padding: 25px; animation: slideUp 0.3s ease-out; max-height: 90vh; overflow-y: auto; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-dark">

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="chevron-left" onclick="location.href='../../workspace.html'"></i>
            <span style="font-weight: 700; font-size: 1.1rem;">Customer Manager</span>
        </div>
        <i data-lucide="refresh-cw" size="20" id="refresh-list" style="cursor: pointer;"></i>
    </header>

    <main class="container">
        <!-- Action Bar -->
        <div class="action-bar">
            <div class="search-box">
                <i data-lucide="search" size="18" style="color:var(--text-muted)"></i>
                <input type="text" id="cust-search" placeholder="Search by name or phone...">
            </div>
            <button class="add-btn" id="open-add-modal"><i data-lucide="plus"></i></button>
        </div>

        <!-- Customer List Container -->
        <div id="customer-list-area">
            <p style="text-align: center; color: var(--text-muted); margin-top: 40px;">Checking records...</p>
        </div>
    </main>

    <!-- Bottom Sheet Modal (Add/Edit) -->
    <div class="modal" id="customer-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 id="modal-title">New Customer</h3>
                <i data-lucide="x" onclick="closeModal()" style="cursor:pointer"></i>
            </div>
            
            <input type="hidden" id="edit-id">
            
            <div class="form-group"><label>Customer Name *</label><input type="text" id="m-name" placeholder="Enter Full Name"></div>
            <div class="form-group"><label>WhatsApp / Mobile</label><input type="tel" id="m-phone" placeholder="91XXXXXXXX"></div>
            <div class="form-group"><label>Address</label><input type="text" id="m-addr" placeholder="City, Area"></div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
                <div class="form-group"><label>Total Amount</label><input type="number" id="m-total" value="0"></div>
                <div class="form-group"><label>Advance Paid</label><input type="number" id="m-paid" value="0"></div>
            </div>

            <div class="form-group" style="margin-top: 10px;">
                <label>Remaining Balance</label>
                <input type="number" id="m-rem" value="0" readonly style="background: rgba(34, 197, 94, 0.1); color: var(--success); font-weight: 800; font-size: 1.1rem;">
            </div>

            <button class="btn btn-primary" id="save-btn" style="width: 100%; margin-top: 15px; height: 55px;">Confirm & Save</button>
        </div>
    </div>

    <!-- Universal Bottom Nav -->
    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from '../../database/supabase.js';
        lucide.createIcons();

        let businessId = null;

        // Auto Calc Logic
        const calculateRemaining = () => {
            const total = parseFloat(document.getElementById('m-total').value) || 0;
            const paid = parseFloat(document.getElementById('m-paid').value) || 0;
            document.getElementById('m-rem').value = (total - paid).toFixed(2);
        };
        document.getElementById('m-total').addEventListener('input', calculateRemaining);
        document.getElementById('m-paid').addEventListener('input', calculateRemaining);

        // Fetch User Context
        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if(!user) return window.location.href = '../../login.html';
            
            const { data: biz } = await supabase.from('businesses').select('id').eq('owner_id', user.id).single();
            businessId = biz?.id;
            
            loadCustomers();
        }

        // module.html ke script section mein 'loadCustomers' function ko isse replace karein:

async function loadCustomers(search = '') {
    const container = document.getElementById('customer-list-area');
    
    try {
        // Business ID check
        if (!businessId) {
            const { data: { user } } = await supabase.auth.getUser();
            const { data: biz } = await supabase.from('businesses').select('id').eq('owner_id', user.id).single();
            businessId = biz?.id;
        }

        let query = supabase.from('customers').select('*').eq('business_id', businessId);
        
        // Search filter fix
        if (search) {
            query = query.ilike('name', `%${search}%`);
        }

        const { data, error } = await query.order('created_at', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
            container.innerHTML = `<div style="text-align:center; margin-top:60px; opacity:0.5">
                <i data-lucide="users" size="40"></i>
                <p style="margin-top:10px">No customers found.</p>
            </div>`;
        } else {
            container.innerHTML = data.map(c => `
                <div class="customer-card">
                    <div class="cust-header">
                        <div>
                            <div class="cust-name">${c.name}</div>
                            <div class="cust-phone"><i data-lucide="phone" size="12"></i> ${c.phone || 'No Mobile'}</div>
                        </div>
                        <div style="text-align: right">
                            <div class="bal-label">Address</div>
                            <div style="font-size: 0.75rem">${c.address || 'Not set'}</div>
                        </div>
                    </div>
                    <div class="balance-strip">
                        <div class="balance-item"><span class="bal-label">Total</span><span class="bal-value">₹${c.total_amount}</span></div>
                        <div class="balance-item"><span class="bal-label">Paid</span><span class="bal-value" style="color:var(--success)">₹${c.advance_paid}</span></div>
                        <div class="balance-item" style="text-align: right"><span class="bal-label">Balance</span><span class="bal-value" style="color:var(--warning)">₹${c.remaining_balance}</span></div>
                    </div>
                    <div class="card-actions">
                        <div class="act-btn" onclick="editCust('${c.id}')"><i data-lucide="edit-2" size="14"></i> UPDATE</div>
                        <div class="act-btn" onclick="deleteCust('${c.id}')" style="color:var(--danger)"><i data-lucide="trash-2" size="14"></i> REMOVE</div>
                    </div>
                </div>
            `).join('');
        }
        lucide.createIcons();

    } catch (err) {
        console.error("Fetch Error:", err);
        container.innerHTML = `<p style="text-align:center; color:#ef4444; padding:20px;">Error loading data: ${err.message}</p>`;
    }
}

        // SAVE OR UPDATE
        document.getElementById('save-btn').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            const payload = {
                business_id: businessId,
                name: document.getElementById('m-name').value,
                phone: document.getElementById('m-phone').value,
                address: document.getElementById('m-addr').value,
                total_amount: parseFloat(document.getElementById('m-total').value) || 0,
                advance_paid: parseFloat(document.getElementById('m-paid').value) || 0,
                remaining_balance: parseFloat(document.getElementById('m-rem').value) || 0
            };

            if(!payload.name) {
                alert("Please enter Name");
                btn.disabled = false;
                btn.innerText = "Confirm & Save";
                return;
            }

            let response;
            if(id) {
                response = await supabase.from('customers').update(payload).eq('id', id);
            } else {
                response = await supabase.from('customers').insert([payload]);
            }

            if(response.error) {
                alert("Error: " + response.error.message);
            } else {
                closeModal();
                loadCustomers();
            }
            btn.disabled = false;
            btn.innerText = "Confirm & Save";
        };

        // EDIT FUNCTION
        window.editCust = async (id) => {
            const { data } = await supabase.from('customers').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('edit-id').value = data.id;
                document.getElementById('m-name').value = data.name;
                document.getElementById('m-phone').value = data.phone;
                document.getElementById('m-addr').value = data.address;
                document.getElementById('m-total').value = data.total_amount;
                document.getElementById('m-paid').value = data.advance_paid;
                document.getElementById('m-rem').value = data.remaining_balance;
                
                document.getElementById('modal-title').innerText = "Update Record";
                document.getElementById('customer-modal').classList.add('active');
            }
        };

        // DELETE FUNCTION
        window.deleteCust = async (id) => {
            if(confirm("Permanently remove this customer?")) {
                await supabase.from('customers').delete().eq('id', id);
                loadCustomers();
            }
        };

        // UI Helpers
        document.getElementById('open-add-modal').onclick = () => {
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-title').innerText = "New Customer";
            document.querySelectorAll('.modal-content input').forEach(i => i.value = (i.type === 'number' ? 0 : ''));
            document.getElementById('customer-modal').classList.add('active');
        };
        window.closeModal = () => document.getElementById('customer-modal').classList.remove('active');
        document.getElementById('cust-search').oninput = (e) => loadCustomers(e.target.value);
        document.getElementById('refresh-list').onclick = () => loadCustomers();

        init();
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

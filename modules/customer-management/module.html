<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Manager - Brain OS</title>
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* TOP & BOTTOM NAV CONSISTENCY */
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; gap: 4px; }
        .nav-item.active { color: var(--accent-color); }

        .module-container { padding: 80px 15px 100px; }

        /* ACTION BAR & BUTTONS */
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-wrapper { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; display: flex; align-items: center; padding: 0 12px; }
        .search-wrapper input { border: none; background: transparent; color: white; width: 100%; padding: 12px 5px; outline: none; font-size: 0.9rem; }
        
        .add-btn { 
            background: var(--accent-color); color: white; 
            width: 48px; height: 48px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            border: none; cursor: pointer; box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* LIST CARDS */
        .customer-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 15px; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .cust-name { font-weight: 700; font-size: 1rem; color: var(--text-main); }
        .cust-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .stat-strip { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 12px; text-align: center; }
        .s-lab { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }
        .s-val { font-size: 0.85rem; font-weight: 700; }

        .actions-row { display: flex; justify-content: flex-end; gap: 20px; margin-top: 15px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .act-btn { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 600; cursor: pointer; color: var(--text-muted); }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal-sheet { background: var(--bg-card); width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-dark">

    <!-- Top Navbar -->
    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="chevron-left" onclick="location.href='../../workspace.html'" style="cursor:pointer"></i>
            <span style="font-weight: 700; font-size: 1.1rem;">Customer Manager</span>
        </div>
        <i data-lucide="refresh-cw" id="refresh-list" size="20" style="cursor:pointer"></i>
    </header>

    <main class="module-container">
        <!-- Search & Add (The UI from your screenshot) -->
        <div class="action-bar">
            <div class="search-wrapper">
                <i data-lucide="search" size="18" style="color:var(--text-muted)"></i>
                <input type="text" id="main-search" placeholder="Search by name...">
            </div>
            <button class="add-btn" id="open-add-sheet">
                <i data-lucide="plus" size="24"></i>
            </button>
        </div>

        <!-- List Section -->
        <div id="list-render-area">
            <p style="text-align: center; color: var(--text-muted); margin-top: 50px;">Connecting to Cloud...</p>
        </div>
    </main>

    <!-- Bottom Sheet Modal -->
    <div class="modal-overlay" id="cust-modal">
        <div class="modal-sheet">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3 id="modal-head">New Customer</h3>
                <i data-lucide="x" onclick="closeModal()" style="cursor:pointer"></i>
            </div>
            <input type="hidden" id="entry-id">
            <div class="form-group"><label>Name *</label><input type="text" id="f-name"></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="f-phone"></div>
            <div class="form-group"><label>Address</label><input type="text" id="f-addr"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
                <div class="form-group"><label>Total Amount</label><input type="number" id="f-total" value="0"></div>
                <div class="form-group"><label>Paid Amount</label><input type="number" id="f-paid" value="0"></div>
            </div>
            <div class="form-group"><label>Remaining Balance</label><input type="number" id="f-rem" readonly style="background:rgba(34,197,94,0.1); color:var(--success); font-weight:800;"></div>
            <button class="btn btn-primary" id="final-save-btn" style="width: 100%; margin-top: 10px;">Save Profile</button>
        </div>
    </div>

    <!-- Bottom Nav (Universal Consistency) -->
    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { getSupabase } from '../../database/supabase.js';
        lucide.createIcons();

        let supabase = getSupabase();
        let bizId = null;

        // Auto Calc
        document.getElementById('f-total').oninput = document.getElementById('f-paid').oninput = () => {
            const t = parseFloat(document.getElementById('f-total').value) || 0;
            const p = parseFloat(document.getElementById('f-paid').value) || 0;
            document.getElementById('f-rem').value = (t - p).toFixed(2);
        };

        // Initialize
        async function init() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                if(!user) return window.location.href = '../../login.html';

                const { data: biz } = await supabase.from('businesses').select('id').eq('owner_id', user.id).maybeSingle();
                if(biz) {
                    bizId = biz.id;
                    loadData();
                } else {
                    document.getElementById('list-render-area').innerHTML = "Business Profile Missing.";
                }
            } catch (e) {
                document.getElementById('list-render-area').innerHTML = "Connection Error. Try Refresh.";
            }
        }

        async function loadData(search = '') {
            const container = document.getElementById('list-render-area');
            let query = supabase.from('customers').select('*').eq('business_id', bizId);
            if(search) query = query.ilike('name', `%${search}%`);
            
            const { data, error } = await query.order('created_at', { ascending: false });

            if(error) { container.innerHTML = "Error loading data."; return; }

            if(!data || data.length === 0) {
                container.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:50px;">No customers found.</p>`;
                return;
            }

            container.innerHTML = data.map(c => `
                <div class="customer-card">
                    <div class="card-top">
                        <div>
                            <div class="cust-name">${c.name}</div>
                            <div class="cust-sub">${c.phone || 'No Mobile'}</div>
                        </div>
                        <div style="text-align:right" class="cust-sub">${c.address || ''}</div>
                    </div>
                    <div class="stat-strip">
                        <div><span class="s-lab">Total</span><div class="s-val">₹${c.total_amount}</div></div>
                        <div><span class="s-lab">Paid</span><div class="s-val" style="color:var(--success)">₹${c.advance_paid}</div></div>
                        <div><span class="s-lab">Balance</span><div class="s-val" style="color:var(--warning)">₹${c.remaining_balance}</div></div>
                    </div>
                    <div class="actions-row">
                        <span class="act-btn" onclick="editNow('${c.id}')"><i data-lucide="edit-3" size="14"></i> UPDATE</span>
                        <span class="act-btn" style="color:var(--danger)" onclick="deleteNow('${c.id}')"><i data-lucide="trash-2" size="14"></i> REMOVE</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Logic
        document.getElementById('final-save-btn').onclick = async () => {
            const id = document.getElementById('entry-id').value;
            const payload = {
                business_id: bizId,
                name: document.getElementById('f-name').value,
                phone: document.getElementById('f-phone').value,
                address: document.getElementById('f-addr').value,
                total_amount: parseFloat(document.getElementById('f-total').value) || 0,
                advance_paid: parseFloat(document.getElementById('f-paid').value) || 0,
                remaining_balance: parseFloat(document.getElementById('f-rem').value) || 0
            };
            if(!payload.name) return alert("Name is required");

            const { error } = id ? await supabase.from('customers').update(payload).eq('id', id) : await supabase.from('customers').insert([payload]);
            if(!error) { closeModal(); loadData(); } else { alert(error.message); }
        };

        window.editNow = async (id) => {
            const { data } = await supabase.from('customers').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('entry-id').value = data.id;
                document.getElementById('f-name').value = data.name;
                document.getElementById('f-phone').value = data.phone;
                document.getElementById('f-addr').value = data.address;
                document.getElementById('f-total').value = data.total_amount;
                document.getElementById('f-paid').value = data.advance_paid;
                document.getElementById('f-rem').value = data.remaining_balance;
                document.getElementById('modal-head').innerText = "Update Customer";
                document.getElementById('cust-modal').classList.add('active');
            }
        };

        window.deleteNow = async (id) => {
            if(confirm("Permanently delete?")) { await supabase.from('customers').delete().eq('id', id); loadData(); }
        };

        document.getElementById('open-add-sheet').onclick = () => {
            document.getElementById('entry-id').value = '';
            document.getElementById('modal-head').innerText = "New Customer";
            document.querySelectorAll('.modal-sheet input').forEach(i => i.value = (i.type === 'number' ? 0 : ''));
            document.getElementById('cust-modal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('cust-modal').classList.remove('active');
        document.getElementById('main-search').oninput = (e) => loadData(e.target.value);
        document.getElementById('refresh-list').onclick = () => location.reload();

        init();
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

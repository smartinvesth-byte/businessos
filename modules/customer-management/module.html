<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Management - Brain OS</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent-color); }

        .module-container { padding: 80px 20px 100px; }
        
        /* Search & Add */
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-color); color: white; padding: 12px; border-radius: 10px; outline: none; }
        .add-btn { background: var(--accent-color); color: white; border: none; padding: 0 15px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }

        /* Customer Card */
        .cust-card { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .cust-info h4 { margin: 0; font-size: 0.95rem; }
        .cust-info p { margin: 2px 0 0; font-size: 0.75rem; color: var(--text-muted); }
        .cust-stats { text-align: right; }
        .cust-stats .spent { font-weight: 700; color: var(--success); font-size: 0.9rem; }
        .cust-stats .orders { font-size: 0.7rem; color: var(--text-muted); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; }
    </style>
</head>
<body class="bg-dark">

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="chevron-left" onclick="location.href='../../workspace.html'" style="cursor: pointer;"></i>
            <span style="font-weight: 700; font-size: 1.1rem;">Customers</span>
        </div>
        <div style="display: flex; gap: 15px;">
            <i data-lucide="refresh-cw" size="20" id="sync-btn" style="cursor: pointer;"></i>
        </div>
    </header>

    <main class="module-container">
        <!-- Search & Add Customer -->
        <div class="action-bar">
            <input type="text" id="cust-search" class="search-input" placeholder="Search by name or phone...">
            <button class="add-btn" id="open-modal"><i data-lucide="plus"></i></button>
        </div>

        <!-- Customer List -->
        <div id="customer-list">
            <p style="text-align: center; color: var(--text-muted); margin-top: 50px;">Loading customers...</p>
        </div>
    </main>

    <!-- Add Customer Modal -->
    <div class="modal" id="cust-modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Add New Customer</h3>
            <div class="form-group"><label>Customer Name</label><input type="text" id="new-name" placeholder="Full Name"></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="new-phone" placeholder="91XXXXXXXX"></div>
            <div class="form-group"><label>Address</label><input type="text" id="new-addr" placeholder="City, Area"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">Cancel</button>
                <button class="btn btn-primary" id="save-cust" style="flex: 2;">Save Customer</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from '../../database/supabase.js';
        lucide.createIcons();

        let businessId = null;

        // 1. Get Business ID
        async function getBiz() {
            const { data: { user } } = await supabase.auth.getUser();
            const { data: biz } = await supabase.from('businesses').select('id').eq('owner_id', user.id).single();
            businessId = biz.id;
            loadCustomers();
        }

        // 2. Load Customers
        async function loadCustomers(search = '') {
            let query = supabase.from('customers').select('*').eq('business_id', businessId);
            
            if(search) query = query.ilike('name', `%${search}%`);

            const { data: customers, error } = await query.order('name');
            
            const list = document.getElementById('customer-list');
            if(customers.length === 0) {
                list.innerHTML = `<p style="text-align: center; color: var(--text-muted); margin-top: 50px;">No customers found.</p>`;
                return;
            }

            list.innerHTML = customers.map(c => `
                <div class="card cust-card">
                    <div class="cust-info">
                        <h4>${c.name}</h4>
                        <p><i data-lucide="phone" size="10"></i> ${c.phone || 'No phone'}</p>
                    </div>
                    <div class="cust-stats">
                        <div class="spent">₹${c.total_spent}</div>
                        <div class="orders">${c.total_orders} orders</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 3. Save Customer
        document.getElementById('save-cust').onclick = async () => {
            const name = document.getElementById('new-name').value;
            const phone = document.getElementById('new-phone').value;
            const address = document.getElementById('new-addr').value;

            if(!name) return alert("Name is required");

            const { error } = await supabase.from('customers').insert([{
                business_id: businessId,
                name, phone, address
            }]);

            if(error) alert(error.message);
            else {
                closeModal();
                loadCustomers();
            }
        };

        // UI Helpers
        const modal = document.getElementById('cust-modal');
        document.getElementById('open-modal').onclick = () => modal.classList.add('active');
        window.closeModal = () => modal.classList.remove('active');

        document.getElementById('cust-search').oninput = (e) => loadCustomers(e.target.value);
        document.getElementById('sync-btn').onclick = () => loadCustomers();

        getBiz();
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

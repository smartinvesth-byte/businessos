<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Management - Brain OS</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent-color); }
        .module-container { padding: 80px 20px 100px; }
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-color); color: white; padding: 12px; border-radius: 10px; outline: none; }
        .add-btn { background: var(--accent-color); color: white; border: none; padding: 0 15px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .cust-card { margin-bottom: 12px; position: relative; overflow: hidden; }
        .cust-type-tag { position: absolute; top: 10px; right: 10px; font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; background: rgba(59,130,246,0.1); color: var(--accent-color); font-weight: 700; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: flex-end; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 100%; max-width: 500px; padding: 25px; border-radius: 25px 25px 0 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-dark">

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="chevron-left" onclick="location.href='../../workspace.html'" style="cursor: pointer;"></i>
            <span style="font-weight: 700; font-size: 1.1rem;">Customer Manager</span>
        </div>
        <i data-lucide="refresh-cw" size="20" id="sync-btn" style="cursor: pointer;"></i>
    </header>

    <main class="module-container">
        <div class="action-bar">
            <input type="text" id="cust-search" class="search-input" placeholder="Name, Email or Phone...">
            <button class="add-btn" id="open-modal"><i data-lucide="plus"></i></button>
        </div>
        <div id="customer-list">
            <p style="text-align: center; color: var(--text-muted); margin-top: 50px;">Fetching records...</p>
        </div>
    </main>

    <!-- Detailed Add Customer Modal -->
    <div class="modal" id="cust-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin:0;">New Customer</h3>
                <i data-lucide="x" onclick="closeModal()" style="cursor:pointer;"></i>
            </div>
            
            <div style="max-height: 70vh; overflow-y: auto; padding-right: 5px;">
                <div class="form-group"><label>Full Name *</label><input type="text" id="new-name" placeholder="John Doe"></div>
                <div class="form-group"><label>WhatsApp / Phone</label><input type="tel" id="new-phone" placeholder="91XXXXXXXX"></div>
                <div class="form-group"><label>Email Address</label><input type="email" id="new-email" placeholder="john@example.com"></div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Customer Type</label>
                        <select id="new-type" style="width:100%; background:var(--bg-secondary); color:white; padding:12px; border:1px solid var(--border-color); border-radius:10px;">
                            <option value="Regular">Regular</option>
                            <option value="VIP">VIP</option>
                            <option value="Wholesale">Wholesale</option>
                        </select>
                    </div>
                    <div class="form-group"><label>GSTIN (Optional)</label><input type="text" id="new-gst" placeholder="GST Number"></div>
                </div>
                
                <div class="form-group"><label>Full Address</label><input type="text" id="new-addr" placeholder="House, Street, City"></div>
                <div class="form-group"><label>Opening Balance (₹)</label><input type="number" id="new-bal" value="0"></div>
            </div>

            <button class="btn btn-primary" id="save-cust" style="width: 100%; margin-top: 20px;">Save Customer Profile</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from '../../database/supabase.js';
        lucide.createIcons();

        let businessId = null;

        async function getContext() {
            const { data: { user } } = await supabase.auth.getUser();
            const { data: biz } = await supabase.from('businesses').select('id').eq('owner_id', user.id).single();
            businessId = biz.id;
            loadCustomers();
        }

        async function loadCustomers(search = '') {
            let query = supabase.from('customers').select('*').eq('business_id', businessId);
            if(search) query = query.or(`name.ilike.%${search}%,phone.ilike.%${search}%,email.ilike.%${search}%`);

            const { data: customers, error } = await query.order('created_at', { ascending: false });
            
            const list = document.getElementById('customer-list');
            if(!customers || customers.length === 0) {
                list.innerHTML = `<p style="text-align: center; color: var(--text-muted); margin-top: 50px;">No customers registered yet.</p>`;
                return;
            }

            list.innerHTML = customers.map(c => `
                <div class="card cust-card">
                    <span class="cust-type-tag">${c.customer_type}</span>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div style="width:45px; height:45px; background:var(--accent-color); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; color:white;">
                            ${c.name.charAt(0)}
                        </div>
                        <div class="cust-info">
                            <h4 style="margin:0;">${c.name}</h4>
                            <p style="margin:2px 0 0; color:var(--text-muted); font-size:0.75rem;">${c.phone || 'No phone'} | ${c.address || 'No address'}</p>
                        </div>
                    </div>
                    <div style="margin-top:15px; padding-top:10px; border-top:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.7rem; color:var(--text-muted);">Balance: <b style="color:${c.current_balance < 0 ? 'var(--danger)' : 'var(--success)'}">₹${c.current_balance}</b></span>
                        <span style="font-size:0.7rem; color:var(--text-muted);">${c.total_orders} Orders</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        document.getElementById('save-cust').onclick = async () => {
            const btn = document.getElementById('save-cust');
            btn.innerText = "Saving...";
            btn.disabled = true;

            const payload = {
                business_id: businessId,
                name: document.getElementById('new-name').value,
                phone: document.getElementById('new-phone').value,
                email: document.getElementById('new-email').value,
                customer_type: document.getElementById('new-type').value,
                gst_number: document.getElementById('new-gst').value,
                address: document.getElementById('new-addr').value,
                current_balance: parseFloat(document.getElementById('new-bal').value) || 0
            };

            const { error } = await supabase.from('customers').insert([payload]);

            if(error) {
                alert("Database Error: " + error.message);
                btn.innerText = "Save Customer Profile";
                btn.disabled = false;
            } else {
                alert("Customer Saved Successfully!");
                closeModal();
                loadCustomers();
                btn.innerText = "Save Customer Profile";
                btn.disabled = false;
                // Clear inputs
                document.querySelectorAll('.modal-content input').forEach(i => i.value = '');
            }
        };

        const modal = document.getElementById('cust-modal');
        document.getElementById('open-modal').onclick = () => modal.classList.add('active');
        window.closeModal = () => modal.classList.remove('active');
        document.getElementById('cust-search').oninput = (e) => loadCustomers(e.target.value);
        document.getElementById('sync-btn').onclick = () => loadCustomers();

        getContext();
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Manager - Brain OS</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Universal Bars */
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent-color); }
        
        .container { padding: 80px 15px 100px; }

        /* Action Bar */
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 75px; background: var(--bg-primary); padding-bottom: 10px; z-index: 900; }
        .search-container { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; display: flex; align-items: center; padding: 0 12px; }
        .search-container input { border: none; background: transparent; color: white; width: 100%; padding: 12px 5px; outline: none; font-size: 0.9rem; }
        .add-btn { background: var(--accent-color); color: white; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 4px 12px var(--accent-glow); }

        /* Customer List Card */
        .customer-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 15px; }
        .cust-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .cust-name { font-weight: 700; font-size: 1rem; color: var(--text-main); }
        .cust-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
        
        .amount-box { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 12px; text-align: center; }
        .amt-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }
        .amt-val { font-size: 0.85rem; font-weight: 700; }

        .list-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .act-link { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 600; cursor: pointer; color: var(--text-muted); }
        .act-link:hover { color: var(--accent-color); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-dark">

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="chevron-left" onclick="location.href='../../workspace.html'"></i>
            <span style="font-weight: 700;">Customer Manager</span>
        </div>
        <i data-lucide="refresh-cw" id="sync-list" size="20" style="cursor:pointer"></i>
    </header>

    <main class="container">
        <!-- Search & Add -->
        <div class="action-bar">
            <div class="search-container">
                <i data-lucide="search" size="18" style="color:var(--text-muted)"></i>
                <input type="text" id="cust-search" placeholder="Search by name...">
            </div>
            <button class="add-btn" id="btn-add-customer"><i data-lucide="plus"></i></button>
        </div>

        <!-- List Section -->
        <div id="customer-list-container">
            <p style="text-align: center; color: var(--text-muted); margin-top: 50px;">Initializing Database...</p>
        </div>
    </main>

    <!-- Add/Edit Modal -->
    <div class="modal" id="customer-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 id="modal-title">New Customer</h3>
                <i data-lucide="x" onclick="closeModal()" style="cursor:pointer"></i>
            </div>
            
            <input type="hidden" id="entry-id">
            <div class="form-group"><label>Customer Name *</label><input type="text" id="f-name"></div>
            <div class="form-group"><label>Mobile Number</label><input type="tel" id="f-phone"></div>
            <div class="form-group"><label>Address</label><input type="text" id="f-addr"></div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
                <div class="form-group"><label>Total Amount</label><input type="number" id="f-total" value="0"></div>
                <div class="form-group"><label>Advance Paid</label><input type="number" id="f-paid" value="0"></div>
            </div>
            <div class="form-group">
                <label>Remaining Balance</label>
                <input type="number" id="f-rem" value="0" readonly style="background:rgba(34,197,94,0.1); color:var(--success); font-weight:800;">
            </div>

            <button class="btn btn-primary" id="btn-save" style="width: 100%; margin-top: 10px; height: 50px;">Confirm & Save</button>
        </div>
    </div>

    <!-- Universal Bottom Nav -->
    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from '../../database/supabase.js';
        lucide.createIcons();

        let activeBizId = null;

        // Auto Balance Math
        const syncMath = () => {
            const t = parseFloat(document.getElementById('f-total').value) || 0;
            const p = parseFloat(document.getElementById('f-paid').value) || 0;
            document.getElementById('f-rem').value = (t - p).toFixed(2);
        };
        document.getElementById('f-total').oninput = syncMath;
        document.getElementById('f-paid').oninput = syncMath;

        // 1. Initial Setup
        async function start() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = '../../login.html';

            const { data: biz } = await supabase.from('businesses').select('id').eq('owner_id', user.id).single();
            if (biz) {
                activeBizId = biz.id;
                renderCustomers();
            }
        }

        // 2. Render List
        async function renderCustomers(search = '') {
            if (!activeBizId) return;
            const listDiv = document.getElementById('customer-list-container');
            
            let query = supabase.from('customers').select('*').eq('business_id', activeBizId);
            if (search) query = query.ilike('name', `%${search}%`);

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) {
                listDiv.innerHTML = `<p style="color:red; text-align:center">Failed to load data.</p>`;
                return;
            }

            if (!data || data.length === 0) {
                listDiv.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:50px;">No customers found.</p>`;
                return;
            }

            listDiv.innerHTML = data.map(c => `
                <div class="customer-item">
                    <div class="cust-row">
                        <div>
                            <div class="cust-name">${c.name}</div>
                            <div class="cust-meta">${c.phone || 'No Mobile'}</div>
                        </div>
                        <div style="text-align:right" class="cust-meta">${c.address || ''}</div>
                    </div>
                    <div class="amount-box">
                        <div><span class="amt-label">Total</span><div class="amt-val">₹${c.total_amount}</div></div>
                        <div><span class="amt-label">Paid</span><div class="amt-val" style="color:var(--success)">₹${c.advance_paid}</div></div>
                        <div><span class="amt-label">Balance</span><div class="amt-val" style="color:var(--warning)">₹${c.remaining_balance}</div></div>
                    </div>
                    <div class="list-actions">
                        <span class="act-link" onclick="handleEdit('${c.id}')"><i data-lucide="edit-3" size="14"></i> UPDATE</span>
                        <span class="act-link" style="color:var(--danger)" onclick="handleDelete('${c.id}')"><i data-lucide="trash-2" size="14"></i> REMOVE</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 3. Action Handlers
        document.getElementById('btn-save').onclick = async () => {
            const id = document.getElementById('entry-id').value;
            const btn = document.getElementById('btn-save');
            btn.disabled = true;

            const payload = {
                business_id: activeBizId,
                name: document.getElementById('f-name').value,
                phone: document.getElementById('f-phone').value,
                address: document.getElementById('f-addr').value,
                total_amount: parseFloat(document.getElementById('f-total').value) || 0,
                advance_paid: parseFloat(document.getElementById('f-paid').value) || 0,
                remaining_balance: parseFloat(document.getElementById('f-rem').value) || 0
            };

            if (!payload.name) {
                alert("Name is required!");
                btn.disabled = false;
                return;
            }

            const { error } = id ? await supabase.from('customers').update(payload).eq('id', id) : await supabase.from('customers').insert([payload]);

            if (error) alert(error.message);
            else { closeModal(); renderCustomers(); }
            btn.disabled = false;
        };

        window.handleEdit = async (id) => {
            const { data } = await supabase.from('customers').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('entry-id').value = data.id;
                document.getElementById('f-name').value = data.name;
                document.getElementById('f-phone').value = data.phone;
                document.getElementById('f-addr').value = data.address;
                document.getElementById('f-total').value = data.total_amount;
                document.getElementById('f-paid').value = data.advance_paid;
                document.getElementById('f-rem').value = data.remaining_balance;
                document.getElementById('modal-title').innerText = "Update Customer";
                document.getElementById('customer-modal').classList.add('active');
            }
        };

        window.handleDelete = async (id) => {
            if (confirm("Delete this customer record?")) {
                await supabase.from('customers').delete().eq('id', id);
                renderCustomers();
            }
        };

        document.getElementById('btn-add-customer').onclick = () => {
            document.getElementById('entry-id').value = '';
            document.querySelectorAll('.modal-content input').forEach(i => i.value = (i.type === 'number' ? 0 : ''));
            document.getElementById('modal-title').innerText = "New Customer";
            document.getElementById('customer-modal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('customer-modal').classList.remove('active');
        document.getElementById('cust-search').oninput = (e) => renderCustomers(e.target.value);
        document.getElementById('sync-list').onclick = () => location.reload();

        start();
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

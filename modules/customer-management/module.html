<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Manager - Brain OS</title>
    
    <!-- 1. External Assets -->
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* UI CONSISTENCY (Directly matching Home/Workspace) */
        .top-navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; gap: 4px; }
        .nav-item.active { color: var(--accent-color); }
        
        .container { padding: 80px 15px 100px; }

        /* ACTION BAR */
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; display: flex; align-items: center; padding: 0 12px; }
        .search-box input { border: none; background: transparent; color: white; width: 100%; padding: 12px 5px; outline: none; font-size: 0.9rem; }
        .add-btn { background: var(--accent-color); color: white; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }

        /* CARDS */
        .cust-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 15px; }
        .cust-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .cust-name { font-weight: 700; font-size: 1rem; color: #fff; }
        .cust-sub { font-size: 0.75rem; color: var(--text-muted); }

        .stat-grid { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; margin-top: 12px; }
        .s-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }
        .s-val { font-size: 0.85rem; font-weight: 700; }

        .card-actions { display: flex; justify-content: flex-end; gap: 20px; margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border-color); }
        .act-item { font-size: 0.75rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; color: var(--text-muted); }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-dark">

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="chevron-left" onclick="location.href='../../workspace.html'" style="cursor:pointer"></i>
            <span style="font-weight: 700;">Customer Manager</span>
        </div>
        <i data-lucide="refresh-cw" size="20" onclick="location.reload()" style="cursor:pointer"></i>
    </header>

    <main class="container">
        <!-- Search & Add (As requested) -->
        <div class="action-bar">
            <div class="search-box">
                <i data-lucide="search" size="18" style="color:var(--text-muted)"></i>
                <input type="text" id="cust-search-input" placeholder="Search customers...">
            </div>
            <button class="add-btn" id="btn-add"><i data-lucide="plus" size="24"></i></button>
        </div>

        <div id="list-container">
            <p style="text-align: center; color: gray; margin-top: 50px;">Connecting...</p>
        </div>
    </main>

    <!-- Bottom Sheet Modal -->
    <div class="modal" id="cust-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3 id="modal-title">New Customer</h3>
                <i data-lucide="x" onclick="closeModal()" style="cursor:pointer"></i>
            </div>
            <input type="hidden" id="edit-id">
            <div class="form-group"><label>Full Name *</label><input type="text" id="f-name"></div>
            <div class="form-group"><label>Mobile</label><input type="tel" id="f-phone"></div>
            <div class="form-group"><label>Address</label><input type="text" id="f-addr"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
                <div class="form-group"><label>Total Amount</label><input type="number" id="f-total" value="0"></div>
                <div class="form-group"><label>Paid Amount</label><input type="number" id="f-paid" value="0"></div>
            </div>
            <div class="form-group">
                <label>Balance</label>
                <input type="number" id="f-rem" readonly style="background:rgba(34,197,94,0.1); color:var(--success); font-weight:800;">
            </div>
            <button class="btn btn-primary" id="save-btn" style="width: 100%; margin-top: 10px; height: 50px;">Save Customer</button>
        </div>
    </div>

    <!-- Universal Bottom Nav -->
    <nav class="bottom-nav">
        <a href="../../dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="../../workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="../../analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="../../alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="../../profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script>
        // --- 1. DIRECT SUPABASE CONFIG (Change these!) ---
        const DB_URL = 'https://leeildsotoqjakirlqsx.supabase.co';
        const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlZWlsZHNvdG9xamFraXJscXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjEyNzEsImV4cCI6MjA5NTEzNzI3MX0.0dxnUHBD-4RyBEQlCGhFjZKd0kA4aRUyOmo3cGhxYjc';

        let supabase;
        let businessId = null;

        // --- 2. INITIALIZATION ---
        window.onload = async () => {
            // Theme check
            if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
            lucide.createIcons();

            try {
                supabase = window.supabase.createClient(DB_URL, DB_KEY);
                const { data: { user } } = await supabase.auth.getUser();
                if(!user) { window.location.href = '../../login.html'; return; }

                const { data: biz } = await supabase.from('businesses').select('id').eq('owner_id', user.id).maybeSingle();
                businessId = biz?.id;
                
                loadList();
            } catch (e) {
                document.getElementById('list-container').innerHTML = "Connection Error. Check Key.";
            }
        };

        // --- 3. LOAD LIST FUNCTION ---
        async function loadList(search = '') {
            const container = document.getElementById('list-container');
            let query = supabase.from('customers').select('*').eq('business_id', businessId);
            if(search) query = query.ilike('name', `%${search}%`);

            const { data, error } = await query.order('created_at', { ascending: false });

            if(error) { container.innerHTML = "Error: " + error.message; return; }
            if(!data || data.length === 0) {
                container.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:50px;">No customers found.</p>`;
                return;
            }

            container.innerHTML = data.map(c => `
                <div class="cust-card">
                    <div class="cust-header">
                        <div><div class="cust-name">${c.name}</div><div class="cust-sub">${c.phone || ''}</div></div>
                        <div class="cust-sub" style="text-align:right">${c.address || ''}</div>
                    </div>
                    <div class="stat-grid">
                        <div><span class="s-label">Total</span><div class="s-val">₹${c.total_amount}</div></div>
                        <div><span class="s-label">Paid</span><div class="s-val" style="color:var(--success)">₹${c.advance_paid}</div></div>
                        <div><span class="s-label">Balance</span><div class="s-val" style="color:var(--warning)">₹${c.remaining_balance}</div></div>
                    </div>
                    <div class="card-actions">
                        <span class="act-item" onclick="handleEdit('${c.id}')"><i data-lucide="edit-3" size="14"></i> UPDATE</span>
                        <span class="act-item" style="color:var(--danger)" onclick="handleDelete('${c.id}')"><i data-lucide="trash-2" size="14"></i> REMOVE</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- 4. CRUD OPERATIONS ---
        document.getElementById('save-btn').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const payload = {
                business_id: businessId,
                name: document.getElementById('f-name').value,
                phone: document.getElementById('f-phone').value,
                address: document.getElementById('f-addr').value,
                total_amount: parseFloat(document.getElementById('f-total').value) || 0,
                advance_paid: parseFloat(document.getElementById('f-paid').value) || 0,
                remaining_balance: parseFloat(document.getElementById('f-rem').value) || 0
            };
            if(!payload.name) return alert("Enter Name");

            const { error } = id ? await supabase.from('customers').update(payload).eq('id', id) : await supabase.from('customers').insert([payload]);
            if(error) alert(error.message); else { closeModal(); loadList(); }
        };

        window.handleEdit = async (id) => {
            const { data } = await supabase.from('customers').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('edit-id').value = data.id;
                document.getElementById('f-name').value = data.name;
                document.getElementById('f-phone').value = data.phone;
                document.getElementById('f-addr').value = data.address;
                document.getElementById('f-total').value = data.total_amount;
                document.getElementById('f-paid').value = data.advance_paid;
                document.getElementById('f-rem').value = data.remaining_balance;
                document.getElementById('modal-title').innerText = "Update Customer";
                document.getElementById('cust-modal').classList.add('active');
            }
        };

        window.handleDelete = async (id) => {
            if(confirm("Delete this customer?")) {
                await supabase.from('customers').delete().eq('id', id);
                loadList();
            }
        };

        // --- 5. UI HELPERS ---
        document.getElementById('btn-add').onclick = () => {
            document.getElementById('edit-id').value = '';
            document.querySelectorAll('#cust-modal input').forEach(i => i.value = (i.type === 'number' ? 0 : ''));
            document.getElementById('modal-title').innerText = "New Customer";
            document.getElementById('cust-modal').classList.add('active');
        };
        window.closeModal = () => document.getElementById('cust-modal').classList.remove('active');
        document.getElementById('cust-search-input').oninput = (e) => loadList(e.target.value);
        document.getElementById('f-total').oninput = document.getElementById('f-paid').oninput = () => {
            const t = parseFloat(document.getElementById('f-total').value) || 0;
            const p = parseFloat(document.getElementById('f-paid').value) || 0;
            document.getElementById('f-rem').value = (t - p).toFixed(2);
        };
    </script>
</body>
</html>

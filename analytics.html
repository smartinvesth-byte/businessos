<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analytics - Business Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .top-navbar { position: fixed; top: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 100; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent-color); }
        .chart-container { height: 180px; display: flex; align-items: flex-end; justify-content: space-around; padding: 20px 0; border-bottom: 1px solid var(--border-color); }
        .bar { width: 30px; background: var(--accent-color); border-radius: 4px 4px 0 0; min-height: 5px; opacity: 0.3; }
    </style>
</head>
<body class="bg-dark">

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="bar-chart-2" style="color: var(--accent-color);"></i>
            <span style="font-weight: 700; font-size: 1.1rem;">Analytics</span>
        </div>
        <div style="display: flex; gap: 15px;">
            <i data-lucide="search" size="20" onclick="location.href='workspace.html'"></i>
            <i data-lucide="settings" size="20" onclick="location.href='profile.html'"></i>
        </div>
    </header>

    <main class="container" style="margin-top: 80px; padding-bottom: 100px;">
        <!-- Business Intelligence Card -->
        <div class="card">
            <h3 style="font-size: 0.8rem; color: var(--accent-color); margin-bottom: 10px;">REVENUE TREND</h3>
            <div class="chart-container">
                <div class="bar" style="height: 10%;"></div>
                <div class="bar" style="height: 10%;"></div>
                <div class="bar" style="height: 10%;"></div>
                <div class="bar" style="height: 15%;"></div>
                <div class="bar" style="height: 10%;"></div>
            </div>
            <p style="text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 10px;">Waiting for sales data...</p>
        </div>

        <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
            <div class="card">
                <span style="font-size: 0.7rem; color: var(--text-muted);">Avg. Daily Revenue</span>
                <div style="font-size: 1.2rem; font-weight: 700; margin-top: 5px;">₹0</div>
            </div>
            <div class="card">
                <span style="font-size: 0.7rem; color: var(--text-muted);">Profit Margin</span>
                <div style="font-size: 1.2rem; font-weight: 700; margin-top: 5px; color: var(--success);">0%</div>
            </div>
        </div>

        <div class="card" style="margin-top: 15px;">
            <h3 style="font-size: 0.9rem; margin-bottom: 10px;">Customer Insights</h3>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 0.8rem; color: var(--text-muted);">New Customers</span>
                <span style="font-weight: 700;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                <span style="font-size: 0.8rem; color: var(--text-muted);">Returning Customers</span>
                <span style="font-weight: 700;">0</span>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item active"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        lucide.createIcons();
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analytics - Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-dark">

    <!-- Top Navbar -->
    <header class="top-navbar" style="position: fixed; top: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; border-bottom: 1px solid var(--border-color);">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="bar-chart-2" style="color: var(--accent-color);"></i>
            <span style="font-weight: 700; font-size: 1.1rem;">Analytics</span>
        </div>
        <div style="display: flex; gap: 15px;">
            <i data-lucide="search" size="20" onclick="location.href='workspace.html'"></i>
            <i data-lucide="user-circle" size="20" onclick="location.href='profile.html'"></i>
        </div>
    </header>

    <main class="container" style="margin-top: 80px; padding-bottom: 100px;">
        <!-- Monthly Summary -->
        <div class="card">
            <h3 style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">MONTHLY PERFORMANCE</h3>
            <div style="display: flex; justify-content: space-between; align-items: flex-end; height: 150px; padding: 10px 0;">
                <!-- Simple CSS Chart Bars (Zero State) -->
                <div style="width: 15%; background: var(--border-color); height: 10%; border-radius: 4px;"></div>
                <div style="width: 15%; background: var(--border-color); height: 10%; border-radius: 4px;"></div>
                <div style="width: 15%; background: var(--border-color); height: 10%; border-radius: 4px;"></div>
                <div style="width: 15%; background: var(--accent-color); height: 10%; border-radius: 4px; opacity: 0.5;"></div>
                <div style="width: 15%; background: var(--border-color); height: 10%; border-radius: 4px;"></div>
            </div>
            <p style="text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 10px;">No transaction data available yet.</p>
        </div>

        <!-- Metric Cards -->
        <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
            <div class="card">
                <span style="font-size: 0.75rem; color: var(--text-muted);">Avg. Sale</span>
                <div style="font-size: 1.1rem; font-weight: 700; margin-top: 5px;">₹0</div>
            </div>
            <div class="card">
                <span style="font-size: 0.75rem; color: var(--text-muted);">Growth Rate</span>
                <div style="font-size: 1.1rem; font-weight: 700; margin-top: 5px; color: var(--success);">0%</div>
            </div>
        </div>

        <div class="card" style="margin-top: 15px;">
            <h3 style="font-size: 0.9rem; margin-bottom: 10px;">Top Categories</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted);">Add inventory or sales to see category analysis.</p>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" style="position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 100;">
        <a href="dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item active"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        lucide.createIcons();
        
        // Theme Persistence
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace - Business Brain OS</title>
    
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Workspace Specific Styles */
        .search-container {
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            padding: 15px 0;
            z-index: 10;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: var(--radius-md);
            gap: 10px;
        }

        .search-bar input {
            border: none;
            padding: 0;
            background: transparent;
            font-size: 0.9rem;
        }

        .category-section {
            margin-bottom: 25px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .category-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Module Grid */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .module-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.2s;
        }

        .module-card:active {
            transform: scale(0.95);
            background: rgba(59, 130, 246, 0.1);
        }

        .module-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            color: var(--accent-color);
        }

        .module-name {
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Bottom Nav (Same as Dashboard) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: var(--bg-secondary);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-bottom: var(--safe-area-inset-bottom);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            text-decoration: none;
        }
        .nav-item.active { color: var(--accent-color); }
    </style>
</head>
<body class="bg-dark">

    <div class="container">
        <!-- Search Engine -->
        <div class="search-container">
            <div class="search-bar">
                <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
                <input type="text" id="module-search" placeholder="Search tools, staff, reports...">
            </div>
        </div>

        <!-- Recent / Pinned -->
        <div class="category-section" id="recent-tools">
            <div class="category-header">
                <span class="category-title">Recent Tools</span>
            </div>
            <div class="module-grid">
                <a href="modules/customer-management/module.html" class="module-card">
                    <div class="module-icon"><i data-lucide="users"></i></div>
                    <span class="module-name">Customers</span>
                </a>
                <a href="#" class="module-card">
                    <div class="module-icon"><i data-lucide="file-text"></i></div>
                    <span class="module-name">Invoices</span>
                </a>
            </div>
        </div>

        <!-- All Categories -->
        <div id="all-modules">
            <!-- Finance Tools -->
            <div class="category-section">
                <div class="category-header">
                    <span class="category-title">Finance Tools</span>
                </div>
                <div class="module-grid">
                    <a href="#" class="module-card">
                        <div class="module-icon"><i data-lucide="wallet"></i></div>
                        <span class="module-name">Expenses</span>
                    </a>
                    <a href="#" class="module-card">
                        <div class="module-icon"><i data-lucide="banknote"></i></div>
                        <span class="module-name">Billing</span>
                    </a>
                    <a href="#" class="module-card">
                        <div class="module-icon"><i data-lucide="pie-chart"></i></div>
                        <span class="module-name">Reports</span>
                    </a>
                </div>
            </div>

            <!-- Operations Tools -->
            <div class="category-section">
                <div class="category-header">
                    <span class="category-title">Operations</span>
                </div>
                <div class="module-grid">
                    <a href="#" class="module-card">
                        <div class="module-icon"><i data-lucide="package"></i></div>
                        <span class="module-name">Inventory</span>
                    </a>
                    <a href="#" class="module-card">
                        <div class="module-icon"><i data-lucide="user-cog"></i></div>
                        <span class="module-name">Staff</span>
                    </a>
                    <a href="#" class="module-card">
                        <div class="module-icon"><i data-lucide="truck"></i></div>
                        <span class="module-name">Vendors</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i data-lucide="home"></i>
            <span>Home</span>
        </a>
        <a href="workspace.html" class="nav-item active">
            <i data-lucide="layout-grid"></i>
            <span>Workspace</span>
        </a>
        <a href="#" class="nav-item">
            <i data-lucide="bar-chart-3"></i>
            <span>Analytics</span>
        </a>
        <a href="#" class="nav-item">
            <i data-lucide="bell"></i>
            <span>Alerts</span>
        </a>
        <a href="#" class="nav-item">
            <i data-lucide="settings"></i>
            <span>Settings</span>
        </a>
    </nav>

    <script type="module">
        lucide.createIcons();

        // Simple Search Logic
        const searchInput = document.getElementById('module-search');
        const modules = document.querySelectorAll('.module-card');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            modules.forEach(module => {
                const name = module.querySelector('.module-name').textContent.toLowerCase();
                if (name.includes(term)) {
                    module.style.display = 'flex';
                } else {
                    module.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>

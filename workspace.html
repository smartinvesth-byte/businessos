<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace - Business Brain OS</title>
    
    <!-- Core Libraries -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* Shared Shell Styles */
        .top-navbar { position: fixed; top: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent-color); }

        /* Workspace Specific Styles */
        .search-area { margin-top: 15px; margin-bottom: 20px; }
        .search-box { display: flex; align-items: center; background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 12px 15px; border-radius: 12px; gap: 10px; }
        .search-box input { border: none; background: transparent; color: white; width: 100%; outline: none; font-size: 0.9rem; }
        
        .category-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 12px 0; }
        
        .module-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .module-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-main); transition: 0.2s; }
        .module-card:active { transform: scale(0.95); background: rgba(59, 130, 246, 0.1); }
        .module-icon { width: 45px; height: 45px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; color: var(--accent-color); }
        .module-name { font-size: 0.7rem; font-weight: 600; }
    </style>
</head>
<body class="bg-dark">

    <!-- Universal Top Navbar -->
    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div onclick="location.href='profile.html'" style="width: 32px; height: 32px; background: var(--accent-color); border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                <img id="header-avatar" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                <i data-lucide="user" id="header-icon" size="18" style="color: white;"></i>
            </div>
            <span id="biz-name-top" style="font-weight: 700; font-size: 1.1rem;">Brain OS</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="theme-btn" style="cursor: pointer; padding: 5px;"><i data-lucide="sun" size="20"></i></div>
            <i data-lucide="search" size="22" style="color: var(--accent-color);"></i>
            <i data-lucide="bell" size="22" onclick="location.href='alerts.html'"></i>
        </div>
    </header>

    <main class="container" style="margin-top: 75px; padding-bottom: 100px;">
        
        <!-- Workspace Search -->
        <div class="search-area">
            <div class="search-box">
                <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
                <input type="text" id="tool-search" placeholder="Search tools, staff, reports...">
            </div>
        </div>

        <!-- Recent Tools -->
        <div class="category-group">
            <div class="category-label">Recent Tools</div>
            <div class="module-grid">
                <!-- Workspace.html mein is line ko update karein -->
<a href="modules/customer-management/module.html" class="module-card">
    <div class="module-icon"><i data-lucide="users"></i></div>
    <span class="module-name">Customers</span>
</a>
                <a href="#" class="module-card">
                    <div class="module-icon"><i data-lucide="file-text"></i></div>
                    <span class="module-name">Invoices</span>
                </a>
            </div>
        </div>

        <!-- Finance Tools -->
        <div class="category-group">
            <div class="category-label">Finance Tools</div>
            <div class="module-grid">
                <a href="#" class="module-card">
                    <div class="module-icon"><i data-lucide="wallet"></i></div>
                    <span class="module-name">Expenses</span>
                </a>
                <a href="#" class="module-card">
                    <div class="module-icon"><i data-lucide="banknote"></i></div>
                    <span class="module-name">Billing</span>
                </a>
                <a href="analytics.html" class="module-card">
                    <div class="module-icon"><i data-lucide="pie-chart"></i></div>
                    <span class="module-name">Reports</span>
                </a>
            </div>
        </div>

        <!-- Operations Tools -->
        <div class="category-group">
            <div class="category-label">Operations</div>
            <div class="module-grid">
                <a href="#" class="module-card">
                    <div class="module-icon"><i data-lucide="package"></i></div>
                    <span class="module-name">Inventory</span>
                </a>
                <a href="modules/staff-management/module.html" class="module-card">
    <div class="module-icon"><i data-lucide="user-cog"></i></div>
    <span class="module-name">Staff</span>
</a>
                <a href="#" class="module-card">
                    <div class="module-icon"><i data-lucide="truck"></i></div>
                    <span class="module-name">Vendors</span>
                </a>
            </div>
        </div>

    </main>

    <!-- Universal Bottom Nav -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item active"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        lucide.createIcons();

        // 1. Theme Engine (Consistent with Dashboard)
        const applyTheme = (theme) => {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const btn = document.getElementById('theme-btn');
            btn.innerHTML = theme === 'light' ? '<i data-lucide="moon" size="20"></i>' : '<i data-lucide="sun" size="20"></i>';
            lucide.createIcons();
        };
        document.getElementById('theme-btn').onclick = () => {
            const current = localStorage.getItem('theme') || 'dark';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        };
        if(localStorage.getItem('theme') === 'light') applyTheme('light');

        // 2. Load Nav Branding
        async function loadNavBranding() {
            const { data: { user } } = await supabase.auth.getUser();
            if(!user) return;
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if(profile) {
                document.getElementById('biz-name-top').innerText = profile.business_name || "Brain OS";
                if(profile.avatar_url) {
                    const avatarImg = document.getElementById('header-avatar');
                    avatarImg.src = profile.avatar_url;
                    avatarImg.style.display = 'block';
                    document.getElementById('header-icon').style.display = 'none';
                }
            }
        }
        loadNavBranding();

        // 3. Simple Search Logic
        const searchInput = document.getElementById('tool-search');
        const cards = document.querySelectorAll('.module-card');

        searchInput.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            cards.forEach(card => {
                const name = card.querySelector('.module-name').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });
        };
    </script>
</body>
</html>

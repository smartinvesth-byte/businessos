<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alerts - Business Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .top-navbar { position: fixed; top: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; border-bottom: 1px solid var(--border-color); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 100; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent-color); }
        .alert-card { border-left: 4px solid var(--accent-color); margin-bottom: 12px; }
        .alert-card.warning { border-left-color: var(--warning); }
        .alert-card.danger { border-left-color: var(--danger); }
    </style>
</head>
<body class="bg-dark">

    <header class="top-navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="bell" style="color: var(--accent-color);"></i>
            <span style="font-weight: 700; font-size: 1.1rem;">Notifications</span>
        </div>
        <button id="mark-read" style="background:none; border:none; color:var(--accent-color); font-size:0.8rem; font-weight:600;">Mark all read</button>
    </header>

    <main class="container" style="margin-top: 80px; padding-bottom: 100px;">
        <div id="alerts-list">
            <!-- Empty State -->
            <div id="empty-alerts" style="text-align: center; margin-top: 80px; opacity: 0.5;">
                <i data-lucide="bell-off" size="48" style="margin-bottom: 15px;"></i>
                <p>All caught up!</p>
                <span style="font-size: 0.75rem;">No new alerts for your business.</span>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item active"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        lucide.createIcons();

        async function loadAlerts() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            const { data: alerts } = await supabase
                .from('notifications')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            if (alerts && alerts.length > 0) {
                const list = document.getElementById('alerts-list');
                document.getElementById('empty-alerts').style.display = 'none';
                list.innerHTML = alerts.map(a => `
                    <div class="card alert-card ${a.type}">
                        <div style="display: flex; justify-content: space-between;">
                            <h4 style="font-size: 0.9rem;">${a.title}</h4>
                            <span style="font-size: 0.65rem; color: var(--text-muted);">${new Date(a.created_at).toLocaleDateString()}</span>
                        </div>
                        <p style="font-size: 0.8rem; margin-top: 5px; color: var(--text-muted);">${a.message}</p>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        }

        loadAlerts();
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>

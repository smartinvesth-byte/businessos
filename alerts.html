<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alerts - Brain OS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-dark">

    <!-- Top Navbar -->
    <header class="top-navbar" style="position: fixed; top: 0; width: 100%; height: 60px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; border-bottom: 1px solid var(--border-color);">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="bell" style="color: var(--accent-color);"></i>
            <span style="font-weight: 700; font-size: 1.1rem;">Smart Alerts</span>
        </div>
        <div style="display: flex; gap: 15px;">
            <button id="clear-alerts" style="background:none; border:none; color:var(--accent-color); font-size:0.8rem;">Mark all read</button>
        </div>
    </header>

    <main class="container" style="margin-top: 80px; padding-bottom: 100px;">
        <div id="alerts-container">
            <!-- Empty State (Default) -->
            <div style="text-align: center; margin-top: 100px; opacity: 0.5;">
                <i data-lucide="bell-off" size="48" style="margin-bottom: 15px;"></i>
                <p>No new alerts at the moment.</p>
                <span style="font-size: 0.75rem;">We'll notify you about low stock or pending payments.</span>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" style="position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--bg-secondary); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 100;">
        <a href="dashboard.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="workspace.html" class="nav-item"><i data-lucide="layout-grid"></i><span>Workspace</span></a>
        <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
        <a href="alerts.html" class="nav-item active"><i data-lucide="bell"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <script type="module">
        import { supabase } from './database/supabase.js';
        lucide.createIcons();

        async function fetchAlerts() {
            const { data: { user } } = await supabase.auth.getUser();
            if(!user) return;

            const { data: alerts } = await supabase
                .from('notifications')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            if(alerts && alerts.length > 0) {
                const container = document.getElementById('alerts-container');
                container.innerHTML = alerts.map(alert => `
                    <div class="card" style="border-left: 4px solid ${alert.type === 'warning' ? 'var(--warning)' : 'var(--accent-color)'};">
                        <div style="display: flex; justify-content: space-between;">
                            <h4 style="font-size: 0.9rem;">${alert.title}</h4>
                            <span style="font-size: 0.7rem; color: var(--text-muted);">${new Date(alert.created_at).toLocaleDateString()}</span>
                        </div>
                        <p style="font-size: 0.85rem; margin-top: 5px;">${alert.message}</p>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        }

        fetchAlerts();
        if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
